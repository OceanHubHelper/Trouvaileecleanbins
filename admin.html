<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://haxotlqsasigorctuvil.supabase.co",
  "sb_publishable_9r0DEvw-b_qK_aUqjA2AEQ_S7clkBfb"
);

async function load() {
  const { data } = await supabase.from("users").select("*");

  document.getElementById("list").innerHTML = data.map(u => `
    <div class="bg-slate-800 p-4 rounded-xl">
      <b>${u.username}</b><br>
      ${u.name}
    </div>
  `).join("");
}

window.onload = load;
</script>

</head>

<body class="bg-slate-950 text-white p-10">

<h1 class="text-3xl font-bold mb-6">Admin Panel</h1>

<div id="list" class="grid gap-4"></div>

</body>
</html>
