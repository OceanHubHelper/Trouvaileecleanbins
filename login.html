<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://haxotlqsasigorctuvil.supabase.co",
  "sb_publishable_9r0DEvw-b_qK_aUqjA2AEQ_S7clkBfb"
);

/* -------------------------
   AUTO CREATE ADMIN ACCOUNT
--------------------------*/
async function createAdminIfNeeded() {
  const { data } = await supabase
    .from("users")
    .select("*")
    .eq("username", "Adrien");

  if (!data || data.length === 0) {
    await supabase.from("users").insert([
      {
        username: "Adrien",
        password: "favela23",
        name: "Founder",
        phone: "ADMIN",
        plan: "OWNER"
      }
    ]);
  }
}

createAdminIfNeeded();

/* -------------------------
   LOGIN
--------------------------*/
window.login = async function () {
  const u = document.getElementById("u").value.trim();
  const p = document.getElementById("p").value.trim();

  const { data } = await supabase
    .from("users")
    .select("*")
    .eq("username", u)
    .eq("password", p)
    .single();

  if (!data) return alert("Invalid login");

  localStorage.setItem("user", JSON.stringify(data));

  if (u === "Adrien" && p === "favela23") {
    location.href = "admin.html";
  } else {
    location.href = "dashboard.html";
  }
};

/* -------------------------
   SIGNUP (NO DUPLICATES)
--------------------------*/
window.signup = async function () {
  const name = document.getElementById("n").value;
  const phone = document.getElementById("ph").value;
  const username = document.getElementById("su").value;
  const password = document.getElementById("sp").value;

  // check duplicate username
  const { data: existing } = await supabase
    .from("users")
    .select("*")
    .eq("username", username);

  if (existing.length > 0) {
    return alert("Username already taken");
  }

  const { error } = await supabase.from("users").insert([
    { name, phone, username, password }
  ]);

  if (error) return alert("Signup failed");

  alert("Account created!");
  location.reload();
};
</script>

</head>

<body class="bg-slate-950 text-white flex items-center justify-center h-screen">

<div class="bg-slate-900 p-8 rounded-2xl w-96">

<h1 class="text-2xl font-bold mb-6">Trouvaille Bins</h1>

<div class="space-y-3">
  <input id="u" placeholder="Username" class="w-full p-3 bg-slate-800 rounded">
  <input id="p" type="password" placeholder="Password" class="w-full p-3 bg-slate-800 rounded">

  <button onclick="login()" class="w-full bg-emerald-500 p-3 rounded font-bold">
    Login
  </button>
</div>

<hr class="my-6 border-slate-700">

<h2 class="font-bold mb-3">Sign Up</h2>

<div class="space-y-3">
  <input id="n" placeholder="Name" class="w-full p-3 bg-slate-800 rounded">
  <input id="ph" placeholder="Phone" class="w-full p-3 bg-slate-800 rounded">
  <input id="su" placeholder="Username" class="w-full p-3 bg-slate-800 rounded">
  <input id="sp" type="password" placeholder="Password" class="w-full p-3 bg-slate-800 rounded">

  <button onclick="signup()" class="w-full bg-slate-700 p-3 rounded font-bold">
    Create Account
  </button>
</div>

</div>

</body>
</html>
