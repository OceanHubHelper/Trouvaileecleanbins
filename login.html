<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://haxotlqsasigorctuvil.supabase.co",
  "sb_publishable_9r0DEvw-b_qK_aUqjA2AEQ_S7clkBfb"
);

window.login = async function () {
  const u = document.getElementById("u").value;
  const p = document.getElementById("p").value;

  const { data } = await supabase
    .from("users")
    .select("*")
    .eq("username", u)
    .eq("password", p)
    .single();

  if (!data) return alert("Invalid login");

  localStorage.setItem("user", JSON.stringify(data));

  if (u === "Adrien" && p === "favela23") {
    window.location.href = "admin.html";
  } else {
    window.location.href = "dashboard.html";
  }
};
</script>

</head>

<body class="bg-slate-950 text-white flex items-center justify-center h-screen">

<div class="bg-slate-900 p-10 rounded-2xl w-96">
  <h1 class="text-2xl font-bold mb-6">Login</h1>

  <input id="u" placeholder="username" class="w-full p-3 mb-3 bg-slate-800 rounded">
  <input id="p" placeholder="password" type="password" class="w-full p-3 mb-3 bg-slate-800 rounded">

  <button onclick="login()" class="w-full bg-emerald-500 p-3 rounded font-bold">
    Login
  </button>
</div>

</body>
</html>
