<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login | Trouvaille Bins</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center px-6">

<div class="glass w-full max-w-md p-8 rounded-3xl">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-black italic">
            Trouvaille <span class="text-emerald-400">Bins</span>
        </h1>
        <p class="text-slate-400 mt-3">Customer Access Portal</p>
    </div>

    <div class="flex gap-2 mb-6">
        <button onclick="showLogin()" id="loginTab" class="tabActive w-1/2 py-3 rounded-2xl font-bold">
            Login
        </button>
        <button onclick="showSignup()" id="signupTab" class="tabIdle w-1/2 py-3 rounded-2xl font-bold">
            Sign Up
        </button>
    </div>

    <!-- LOGIN -->
    <div id="loginBox">
        <input id="loginUser" class="input mb-4" placeholder="Username">
        <input id="loginPass" type="password" class="input mb-4" placeholder="Password">
        <button onclick="login()" class="btn bg-emerald-500 w-full">
            Login
        </button>
    </div>

    <!-- SIGNUP -->
    <div id="signupBox" class="hidden">
        <input id="signupName" class="input mb-4" placeholder="Full Name">
        <input id="signupPhone" class="input mb-4" placeholder="Phone Number">
        <input id="signupUser" class="input mb-4" placeholder="Username">
        <input id="signupPass" type="password" class="input mb-4" placeholder="Password">
        <button onclick="signup()" class="btn bg-emerald-500 w-full">
            Create Account
        </button>
    </div>

    <a href="index.html" class="block text-center mt-6 text-slate-400 hover:text-white">
        ← Back Home
    </a>
</div>

<script src="supabase.js"></script>
<script src="app.js"></script>

<script>
function showLogin(){
    loginBox.classList.remove("hidden");
    signupBox.classList.add("hidden");
    loginTab.className="tabActive w-1/2 py-3 rounded-2xl font-bold";
    signupTab.className="tabIdle w-1/2 py-3 rounded-2xl font-bold";
}

function showSignup(){
    signupBox.classList.remove("hidden");
    loginBox.classList.add("hidden");
    signupTab.className="tabActive w-1/2 py-3 rounded-2xl font-bold";
    loginTab.className="tabIdle w-1/2 py-3 rounded-2xl font-bold";
}
</script>

</body>
</html>
