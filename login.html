<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://haxotlqsasigorctuvil.supabase.co",
  "sb_publishable_9r0DEvw-b_qK_aUqjA2AEQ_S7clkBfb"
);

/* AUTO CREATE ADMIN */
async function createAdmin() {
  const { data } = await supabase
    .from("users")
    .select("*")
    .eq("username", "Adrien");

  if (!data || data.length === 0) {
    await supabase.from("users").insert([{
      username: "Adrien",
      password: "favela23",
      name: "Founder",
      phone: "ADMIN"
    }]);
  }
}
createAdmin();

/* LOGIN */
window.login = async function () {
  const u = document.getElementById("u").value.trim();
  const p = document.getElementById("p").value.trim();

  const { data } = await supabase
    .from("users")
    .select("*")
    .eq("username", u)
    .eq("password", p);

  if (!data || data.length === 0) {
    alert("Invalid login");
    return;
  }

  const user = data[0];
  localStorage.setItem("user", JSON.stringify(user));

  if (user.username === "Adrien") {
    location.href = "admin.html";
  } else {
    location.href = "dashboard.html";
  }
};

/* SIGNUP (NO DUPLICATES) */
window.signup = async function () {
  const name = document.getElementById("n").value;
  const phone = document.getElementById("ph").value;
  const username = document.getElementById("su").value;
  const password = document.getElementById("sp").value;

  const { data: exists } = await supabase
    .from("users")
    .select("*")
    .eq("username", username);

  if (exists.length > 0) {
    alert("Username taken");
    return;
  }

  await supabase.from("users").insert([
    { name, phone, username, password }
  ]);

  alert("Account created!");
};
</script>

</head>

<body class="bg-slate-950 text-white flex items-center justify-center h-screen">

<div class="bg-slate-900 p-8 rounded-2xl w-96">

<h1 class="text-2xl font-bold mb-6">Login</h1>

<input id="u" placeholder="username" class="w-full p-3 mb-3 bg-slate-800 rounded">
<input id="p" type="password" placeholder="password" class="w-full p-3 mb-3 bg-slate-800 rounded">

<button onclick="login()" class="w-full bg-emerald-500 p-3 rounded font-bold mb-6">
Login
</button>

<hr class="border-slate-700 mb-6">

<h2 class="font-bold mb-3">Sign Up</h2>

<input id="n" placeholder="name" class="w-full p-3 mb-2 bg-slate-800 rounded">
<input id="ph" placeholder="phone" class="w-full p-3 mb-2 bg-slate-800 rounded">
<input id="su" placeholder="username" class="w-full p-3 mb-2 bg-slate-800 rounded">
<input id="sp" type="password" placeholder="password" class="w-full p-3 mb-2 bg-slate-800 rounded">

<button onclick="signup()" class="w-full bg-slate-700 p-3 rounded font-bold">
Create Account
</button>

</div>

</body>
</html>
