<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trouvaille Clean Bins | Premium Sanitization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        .tail-container * { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #064e3b 0%, #059669 100%); }
        .dropdown-content { display: none; }
        .show { display: block !important; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type=range] { -webkit-appearance: none; background: #ecfdf5; border-radius: 99px; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%;
            background: #10b981; cursor: pointer; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body class="tail-container bg-[#F9FAFB] text-slate-900 scroll-smooth">

<nav class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-[100]">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <img src="https://i.imgur.com/syOOmTK.png" alt="Logo" class="w-12 h-12">
            <div class="hidden md:block">
                <p class="text-xl font-bold tracking-tight text-slate-900">Trouvaille</p>
                <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-[0.2em] mt-[-4px]">Clean Bins</p>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="relative">
                <button onclick="toggleDropdown()" class="flex items-center gap-2 p-1 pr-3 rounded-full border border-slate-200 hover:border-emerald-500 transition-all bg-white group">
                    <div id="nav-avatar" class="w-8 h-8 rounded-full bg-emerald-600 text-white flex items-center justify-center font-bold text-sm">G</div>
                    <span id="nav-user-name" class="text-sm font-semibold text-slate-600 group-hover:text-emerald-600">Guest</span>
                    <i class="fa-solid fa-chevron-down text-[10px] text-slate-400"></i>
                </button>
                <div id="profileDropdown" class="dropdown-content absolute right-0 mt-3 w-64 bg-white border border-slate-100 rounded-2xl shadow-2xl py-3 z-[110]">
                    <button onclick="openModal('profile-modal')" class="w-full text-left px-4 py-2.5 hover:bg-emerald-50 text-slate-600 text-sm flex items-center gap-3">👤 My Profile</button>
                    <button onclick="openModal('settings-modal')" class="w-full text-left px-4 py-2.5 hover:bg-emerald-50 text-slate-600 text-sm flex items-center gap-3">⚙️ Settings</button>
                    <hr class="my-2 border-slate-50">
                    <button id="auth-action-btn" onclick="openAuthModal()" class="w-full text-left px-4 py-2.5 text-red-500 font-bold text-sm">Sign In</button>
                </div>
            </div>
        </div>
    </div>
</nav>

<section class="hero-gradient pt-32 pb-40 text-center text-white px-6">
    <h1 class="text-5xl md:text-7xl font-extrabold mb-8">Elite Cleanliness.</h1>
    <button onclick="scrollToBooking()" class="bg-white text-emerald-900 px-10 py-4 rounded-2xl font-black shadow-2xl">Schedule Service</button>
</section>

<section id="pricing" class="py-24 bg-slate-900">
    <div class="max-w-xl mx-auto px-6">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl">
            <input type="range" id="bin-slider" min="1" max="10" value="1" oninput="updatePrice()" class="w-full h-2 mb-10 appearance-none">
            <div class="flex justify-between items-center mb-12">
                <span id="bin-count-text" class="text-4xl font-black italic">1 Bin</span>
                <span id="total-price-text" class="text-5xl font-black text-emerald-600">$15</span>
            </div>
            <button onclick="openBookingForm()" class="w-full bg-slate-900 text-white py-6 rounded-2xl font-black text-xl hover:bg-emerald-600 transition-all">CONTINUE</button>
        </div>
    </div>
</section>

<div id="auth-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[200] p-4">
    <div class="bg-white p-10 rounded-[2.5rem] max-w-sm w-full shadow-2xl relative">
        <button onclick="closeModal('auth-modal')" class="mb-4 text-slate-400 hover:text-emerald-600 flex items-center gap-2 text-xs font-bold uppercase tracking-widest transition-all">
            <i class="fa-solid fa-arrow-left"></i> Back
        </button>
        <h2 id="auth-title" class="text-2xl font-black mb-6">Account Login</h2>
        <div class="space-y-3">
            <input id="auth-user" placeholder="Username" class="w-full bg-slate-50 border-none p-4 rounded-xl outline-none">
            <input id="auth-email" type="email" placeholder="Email Address" class="w-full bg-slate-50 border-none p-4 rounded-xl outline-none hidden">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full bg-slate-50 border-none p-4 rounded-xl outline-none">
            <button onclick="handleAuth()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold shadow-lg transition-all">Continue</button>
        </div>
        <button onclick="toggleAuthMode()" id="auth-toggle-btn" class="w-full text-slate-400 mt-6 text-xs font-bold uppercase">New? Create Account</button>
    </div>
</div>

<div id="booking-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[200] p-4">
    <div class="bg-white p-10 rounded-[3rem] max-w-md w-full shadow-2xl relative">
        <button onclick="closeModal('booking-modal')" class="mb-4 text-slate-400 hover:text-emerald-600 flex items-center gap-2 text-xs font-bold uppercase tracking-widest transition-all">
            <i class="fa-solid fa-arrow-left"></i> Back to Pricing
        </button>
        <h2 class="text-2xl font-black mb-6">Secure Booking</h2>
        <form onsubmit="sendBooking(event)" class="space-y-4">
            <input id="form-name" required placeholder="Full Name" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-none">
            <input id="form-email" type="email" required placeholder="Email Address" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-none">
            <input id="form-address" required placeholder="Service Address" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-none">
            <input id="form-phone" required placeholder="Phone Number" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-none">
            <div class="bg-emerald-900 p-6 rounded-2xl text-center shadow-lg my-4">
                <p id="modal-total" class="text-4xl font-black text-white">$15</p>
            </div>
            <button class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-emerald-700 transition-all">CONFIRM 🧼</button>
        </form>
    </div>
</div>

<script>
    // --- ⚠️ CRITICAL: YOU MUST ADD YOUR PUBLIC KEY HERE ⚠️ ---
    // Get this from EmailJS: Account -> Public Key
    emailjs.init("v-4sLf-EzCLBYcWe7"); 

    let currentUser = JSON.parse(localStorage.getItem('loggedUser')) || null;
    let isSignUp = false;
    const badWords = ["bad", "mean"]; 

    function toggleDropdown() { document.getElementById("profileDropdown").classList.toggle("show"); }
    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    function scrollToBooking() { document.getElementById('pricing').scrollIntoView({ behavior: 'smooth' }); }

    // --- AUTH ---
    function openAuthModal() { openModal('auth-modal'); }
    function toggleAuthMode() {
        isSignUp = !isSignUp;
        document.getElementById('auth-title').innerText = isSignUp ? "Create Profile" : "Account Login";
        document.getElementById('auth-email').classList.toggle('hidden', !isSignUp);
    }

    function handleAuth() {
        const user = document.getElementById('auth-user').value.toLowerCase();
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;

        if (isSignUp) {
            let users = JSON.parse(localStorage.getItem('users')) || [];
            users.push({ username: user, email: email, password: pass, address: "", phone: "" });
            localStorage.setItem('users', JSON.stringify(users));
            currentUser = { username: user, email: email, address: "", phone: "" };
        } else {
            let users = JSON.parse(localStorage.getItem('users')) || [];
            const found = users.find(u => u.username === user && u.password === pass);
            if (!found) return alert("Invalid Login");
            currentUser = found;
        }

        localStorage.setItem('loggedUser', JSON.stringify(currentUser));
        closeModal('auth-modal');
        updateUI();
    }

    function logout() {
        localStorage.removeItem('loggedUser');
        currentUser = null;
        updateUI();
    }

    function updateUI() {
        const authBtn = document.getElementById('auth-action-btn');
        const navName = document.getElementById('nav-user-name');
        if (currentUser) {
            authBtn.innerText = "Sign Out";
            navName.innerText = currentUser.username;
        } else {
            authBtn.innerText = "Sign In";
            navName.innerText = "Guest";
        }
    }

    // --- PRICING ---
    let binCount = 1;
    let totalPrice = 15;
    function updatePrice() {
        binCount = parseInt(document.getElementById('bin-slider').value);
        totalPrice = 15 + (binCount - 1) * 10;
        document.getElementById('bin-count-text').innerText = binCount + (binCount === 1 ? " Bin" : " Bins");
        document.getElementById('total-price-text').innerText = '$' + totalPrice;
        document.getElementById('modal-total').innerText = '$' + totalPrice;
    }

    // --- BOOKING ---
    function openBookingForm() { 
        if (currentUser) {
            document.getElementById('form-name').value = currentUser.username;
            document.getElementById('form-email').value = currentUser.email || "";
            document.getElementById('form-address').value = currentUser.address || "";
            document.getElementById('form-phone').value = currentUser.phone || "";
        }
        openModal('booking-modal'); 
    }

    async function sendBooking(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.innerText = "SENDING...";
        
        const params = {
            name: document.getElementById('form-name').value,
            address: document.getElementById('form-address').value,
            phone: document.getElementById('form-phone').value,
            email: document.getElementById('form-email').value,
            bins: binCount,
            total: totalPrice
        };

        try {
            // Check your Service ID and Template IDs in EmailJS!
            await emailjs.send("service_6ymb279", "template_pruo22c", params); // To You
            await emailjs.send("service_6ymb279", "template_4hi1opb", params); // To Customer
            
            alert("Booking Confirmed! Check your email.");
            closeModal('booking-modal');
            e.target.reset();
        } catch (err) {
            console.error("EmailJS Error:", err);
            alert("Email failed to send. Check your Public Key!");
        }
        btn.innerText = "CONFIRM 🧼";
    }

    updateUI();
</script>
</body>
</html>
