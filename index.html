<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trouvaille Bins - System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#020617;
    color:white;
}
.hidden{display:none;}
.glass{
    background:rgba(15,23,42,0.8);
    border:1px solid #1e293b;
    border-radius:16px;
    padding:16px;
}
button{
    cursor:pointer;
}
.btn{
    padding:12px;
    border-radius:12px;
    font-weight:700;
}
.green{background:#10b981;color:black;}
.red{background:#ef4444;color:white;}
.blue{background:#3b82f6;color:white;}
input,select{
    width:100%;
    padding:10px;
    border-radius:10px;
    background:#0f172a;
    color:white;
    border:1px solid #1e293b;
}
.card{
    background:#0f172a;
    padding:12px;
    border-radius:12px;
    border:1px solid #1e293b;
}
.small{font-size:12px;color:#94a3b8;}
</style>
</head>

<body>

<div class="glass" style="margin:10px;">
<h2>Trouvaille Bins System</h2>
<div id="userInfo">Guest</div>
<button class="btn green" onclick="openLogin()">Login</button>
</div>

<!-- LOGIN -->
<div id="loginBox" class="hidden glass" style="margin:10px;">
<h3>Login</h3>
<input id="u" placeholder="username"/>
<input id="p" type="password" placeholder="password"/>
<button class="btn green" onclick="login()">Enter</button>
<button class="btn red" onclick="closeLogin()">Close</button>
</div>

<!-- BOOKING -->
<div class="glass" style="margin:10px;">
<h3>Book Service</h3>

<select id="plan">
<option>One-Time</option>
<option>Monthly</option>
</select>

<input id="bins" type="number" value="1" min="1"/>

<input id="address" placeholder="address"/>

<button class="btn blue" onclick="book()">Book Now</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden glass" style="margin:10px;">
<h2>ADMIN PANEL (Jobber)</h2>
<div id="jobs"></div>
</div>

<script>
emailjs.init("Or10zkajJK3CNcnic");

/* DATABASE */
let db = JSON.parse(localStorage.getItem("db")||"{}");
if(!db.users) db.users=[];
if(!db.jobs) db.jobs=[];
if(!db.session) db.session=null;

function save(){
localStorage.setItem("db",JSON.stringify(db));
}

/* SESSION */
function login(){
let u=document.getElementById("u").value;
let p=document.getElementById("p").value;

if(u==="admin" && p==="1234"){
db.session={user:"admin",role:"admin"};
save();
location.reload();
return;
}

let user=db.users.find(x=>x.u===u && x.p===p);
if(!user){alert("bad login");return;}

db.session=user;
save();
location.reload();
}

function openLogin(){document.getElementById("loginBox").classList.remove("hidden")}
function closeLogin(){document.getElementById("loginBox").classList.add("hidden")}

/* BOOKING */
function book(){
if(!db.session){alert("login first");return;}

let job={
id:Date.now(),
user:db.session.u,
plan:document.getElementById("plan").value,
bins:document.getElementById("bins").value,
address:document.getElementById("address").value,
status:"pending",
startTime:null
};

db.jobs.push(job);
save();
renderJobs();
alert("Booked!");
}

/* ADMIN JOBBER */
function startJob(id){
let job=db.jobs.find(j=>j.id===id);
job.status="running";
job.startTime=Date.now();
save();
renderJobs();
}

function stopJob(id){
let job=db.jobs.find(j=>j.id===id);
job.status="done";
save();
renderJobs();
}

/* TIMER */
function getTime(start){
if(!start) return "0m";
let sec=Math.floor((Date.now()-start)/1000);
let m=Math.floor(sec/60);
return m+"m "+(sec%60)+"s";
}

/* RENDER */
function renderJobs(){
if(!db.session || db.session.role!=="admin") return;

document.getElementById("adminPanel").classList.remove("hidden");

document.getElementById("jobs").innerHTML=
db.jobs.map(j=>`
<div class="card">
<b>${j.user}</b><br>
${j.plan} - ${j.bins} bins<br>
${j.address}<br>
Status: ${j.status}<br>
Timer: ${j.startTime ? getTime(j.startTime) : "not started"}<br>

${j.status==="pending"
? `<button class="btn green" onclick="startJob(${j.id})">Start Cleaning</button>`
: ""}

${j.status==="running"
? `<button class="btn red" onclick="stopJob(${j.id})">Finish</button>`
: ""}
</div>
`).join("");
}

/* SESSION LOAD */
function load(){
if(db.session){
document.getElementById("userInfo").innerText=db.session.user;

if(db.session.role==="admin"){
renderJobs();
}
}
}

load();
setInterval(renderJobs,1000);
</script>

</body>
</html>
