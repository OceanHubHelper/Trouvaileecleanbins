<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trouvaille Bins</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        :root { --bg: #020617; --card: #0f172a; --text: #f8fafc; --border: #1e293b; --accent: #10b981; }
        .light-mode { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; --accent: #059669; }
        * { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; scroll-behavior: smooth; }
        body { background-color: var(--bg); color: var(--text); margin: 0; }
        .glass-card { background-color: var(--card); border: 1px solid var(--border); }
        .owner-only { display: none !important; }
        body.is-owner .owner-only { display: block !important; }
        .dropdown { display: none; position: absolute; right: 0; top: 115%; width: 16rem; background: var(--card); border: 1px solid var(--border); border-radius: 1rem; z-index: 100; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .show { display: block !important; }
    </style>
</head>
<body>

<nav class="sticky top-0 z-[100] border-b border-slate-800/20 bg-inherit backdrop-blur-md p-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <h1 class="text-xl font-extrabold italic uppercase tracking-tighter">Trouvaille Bins</h1>
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="text-lg hover:text-emerald-500"><i class="fa-solid fa-circle-half-stroke"></i></button>
            <div class="relative">
                <button onclick="toggleDrop()" class="flex items-center gap-3 glass-card p-2 px-4 rounded-full">
                    <span id="nav-name" class="text-[10px] font-bold uppercase opacity-60 tracking-widest">Guest</span>
                    <img id="nav-img" src="https://ui-avatars.com/api/?name=?&background=10b981&color=fff" class="w-8 h-8 rounded-full object-cover">
                </button>
                <div id="drop" class="dropdown overflow-hidden">
                    <button onclick="openM('owner-panel')" class="owner-only w-full text-left p-4 hover:bg-emerald-500/10 text-[10px] font-black text-emerald-500 border-b border-slate-800/20 uppercase tracking-widest">Founder Panel</button>
                    <button id="p-btn" onclick="openM('profile-modal')" class="hidden w-full text-left p-4 hover:bg-emerald-500/10 text-[10px] font-bold border-b border-slate-800/20 uppercase tracking-widest">Settings</button>
                    <button id="lo-btn" onclick="logout()" class="hidden w-full text-left p-4 hover:bg-red-500/10 text-[10px] font-bold text-red-500 uppercase tracking-widest">Sign Out</button>
                    <button id="li-btn" onclick="openM('auth-modal')" class="w-full text-left p-4 hover:bg-emerald-500/10 text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Sign In</button>
                </div>
            </div>
        </div>
    </div>
</nav>

<header class="pt-32 pb-20 px-6 text-center">
    <h2 class="text-6xl md:text-8xl font-black italic uppercase leading-none mb-6">Pristine Bins.<br><span class="text-emerald-500">Elite Care.</span></h2>
    <p class="opacity-60 text-lg mb-10 max-w-xl mx-auto font-medium">Eco-friendly sanitization for your bins.</p>
    <button onclick="document.getElementById('plans').scrollIntoView()" class="bg-emerald-500 text-white px-12 py-5 rounded-2xl font-black uppercase text-sm shadow-xl hover:scale-105">Start Now</button>
</header>

<section id="plans" class="py-20 max-w-5xl mx-auto px-6 text-center">
    <div class="grid md:grid-cols-2 gap-8">
        <div class="glass-card p-12 rounded-[3rem] text-left">
            <h4 class="text-2xl font-black uppercase italic mb-4">Single Wash</h4>
            <div class="mb-8">
                <div class="flex justify-between items-end mb-4"><span id="bin-display" class="text-3xl font-black">1 Bin</span><span id="single-price" class="text-3xl font-black text-emerald-500">$15</span></div>
                <input type="range" id="bin-slider" min="1" max="5" value="1" oninput="updPrc()" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer">
            </div>
            <button onclick="book('Single Wash')" class="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black uppercase text-xs">Book</button>
        </div>
        <div class="bg-emerald-600 p-12 rounded-[3rem] text-left text-white shadow-2xl">
            <h4 class="text-2xl font-black uppercase italic mb-4">Monthly</h4>
            <div class="text-5xl font-black mb-8">$20 <span class="text-sm font-normal opacity-70">/mo</span></div>
            <button onclick="book('Monthly Elite')" class="w-full bg-white text-emerald-600 py-5 rounded-2xl font-black uppercase text-xs">Subscribe</button>
        </div>
    </div>
</section>

<div id="auth-modal" class="hidden fixed inset-0 bg-black/90 z-[500] flex items-center justify-center p-4">
    <div class="glass-card p-10 rounded-[3rem] w-full max-w-sm relative">
        <h2 id="a-tit" class="text-3xl font-black uppercase italic mb-8 text-center">Sign In</h2>
        <div class="space-y-3">
            <input id="a-u" placeholder="Username" class="w-full bg-inherit border border-slate-800/40 p-5 rounded-2xl outline-none">
            <div id="reg-fields" class="hidden space-y-3">
                <input id="a-e" placeholder="Email" class="w-full bg-inherit border border-slate-800/40 p-5 rounded-2xl outline-none">
            </div>
            <input id="a-p" type="password" placeholder="Passcode" class="w-full bg-inherit border border-slate-800/40 p-5 rounded-2xl outline-none">
            <button onclick="auth()" class="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black uppercase">Go</button>
            <button onclick="tAuth()" id="a-tgl" class="w-full opacity-50 text-[10px] font-black uppercase mt-4">Create Account</button>
        </div>
    </div>
</div>

<div id="book-modal" class="hidden fixed inset-0 bg-black/95 z-[500] flex items-center justify-center p-4">
    <div class="glass-card p-10 rounded-[3rem] w-full max-w-sm relative">
        <h2 class="text-2xl font-black uppercase italic mb-2">Confirm</h2>
        <p id="b-summary" class="text-emerald-500 font-black text-xs uppercase mb-8"></p>
        <input id="b-addr" placeholder="Service Address" class="w-full bg-inherit border border-slate-800/40 p-5 rounded-2xl mb-4">
        <button id="b-sub" onclick="handleOrder()" class="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black uppercase tracking-widest">Confirm Wash</button>
        <button onclick="closeM('book-modal')" class="absolute top-8 right-8 opacity-40 text-2xl">&times;</button>
    </div>
</div>

<script>
    // THE KEYS
    const E_PUB = "Or10zkajJK3CNcnic"; 
    const E_SER = "service_6ymb279"; 
    const T_OWN = "template_pruo22c"; 
    const T_CUS = "template_4hi1opb"; 

    // Initializing with the global method
    (function(){
        emailjs.init(E_PUB);
    })();

    let currentUser = JSON.parse(localStorage.getItem('loggedUser')) || null;
    let isLogin = true;
    let activePlan = "";
    let activePrice = "";

    function boot() {
        if(!localStorage.getItem('users')) localStorage.setItem('users', JSON.stringify([]));
        if(currentUser) {
            document.getElementById('nav-name').innerText = currentUser.username;
            document.getElementById('li-btn').classList.add('hidden');
            document.getElementById('lo-btn').classList.remove('hidden');
            if(currentUser.username === "Adrien") document.body.classList.add('is-owner');
        }
    }

    function updPrc() {
        const val = document.getElementById('bin-slider').value;
        const total = 15 + (val - 1) * 10;
        document.getElementById('bin-display').innerText = val + (val > 1 ? " Bins" : " Bin");
        document.getElementById('single-price').innerText = "$" + total;
        activePrice = "$" + total;
    }

    async function handleOrder() {
        const addr = document.getElementById('b-addr').value;
        const btn = document.getElementById('b-sub');
        if(!addr) return alert("Address required.");
        
        btn.innerText = "Sending..."; btn.disabled = true;

        const data = {
            user_name: currentUser.username,
            user_contact: currentUser.email || "N/A",
            plan_selected: activePlan,
            price: activePrice,
            address: addr
        };

        try {
            // Using the simpler .send method
            await emailjs.send(E_SER, T_OWN, data);
            await emailjs.send(E_SER, T_CUS, data);
            alert("Sent! We will contact you soon.");
            location.reload();
        } catch (e) {
            alert("Error: " + (e.text || "Check your Public Key in EmailJS Settings. Current: " + E_PUB));
            btn.innerText = "Confirm Wash"; btn.disabled = false;
        }
    }

    function auth() {
        const u = document.getElementById('a-u').value.trim();
        const p = document.getElementById('a-p').value;
        let users = JSON.parse(localStorage.getItem('users'));
        if(isLogin) {
            if(u === "Adrien" && p === "favela23") login({username:"Adrien"});
            else {
                const f = users.find(x => x.username === u && x.password === p);
                if(f) login(f); else alert("Failed.");
            }
        } else {
            const newUser = {username:u, password:p, email:document.getElementById('a-e').value};
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            login(newUser);
        }
    }

    function login(obj) { localStorage.setItem('loggedUser', JSON.stringify(obj)); location.reload(); }
    function logout() { localStorage.removeItem('loggedUser'); location.reload(); }
    function tAuth() { isLogin = !isLogin; document.getElementById('a-tit').innerText = isLogin ? "Sign In" : "Sign Up"; document.getElementById('reg-fields').classList.toggle('hidden', isLogin); }
    function openM(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeM(id) { document.getElementById(id).classList.add('hidden'); }
    function toggleDrop() { document.getElementById('drop').classList.toggle('show'); }
    function book(plan) { if(!currentUser) return openM('auth-modal'); activePlan = plan; updPrc(); if(plan !== 'Single Wash') activePrice = "$20/mo"; document.getElementById('b-summary').innerText = plan + " | " + activePrice; openM('book-modal'); }

    boot();
</script>
</body>
</html>
