<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trouvaille Bins</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
body {
  background:#020617;
  color:white;
  font-family: Arial;
}
.glass {
  background: rgba(15,23,42,0.7);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:20px;
}
.hidden{display:none;}
button{cursor:pointer}
input{width:100%;padding:10px;margin:5px 0;border-radius:10px;background:#0f172a;color:white}
</style>
</head>

<body class="p-6">

<!-- HEADER -->
<div class="text-center mb-10">
  <h1 class="text-4xl font-bold text-emerald-400">Trouvaille Bins</h1>
  <p class="text-gray-400">Bin Cleaning Command System</p>
</div>

<!-- LOGIN -->
<div id="loginBox" class="glass max-w-md mx-auto">
  <h2 class="text-xl font-bold mb-3">Login</h2>
  <input id="user" placeholder="Username"/>
  <input id="pass" type="password" placeholder="Password"/>
  <button onclick="login()" class="bg-emerald-500 w-full p-2 rounded mt-3">Enter</button>
  <button onclick="toggleSignup()" class="text-sm mt-2 text-gray-400">Create account</button>

  <div id="signupBox" class="hidden mt-3">
    <input id="name" placeholder="Full Name"/>
    <input id="phone" placeholder="Contact Info"/>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

  <!-- USER INFO -->
  <div class="glass mb-5">
    <p id="welcome"></p>
    <button onclick="logout()" class="text-red-400">Logout</button>
  </div>

  <!-- PRICING -->
  <div class="glass mb-5">
    <h2 class="font-bold text-xl">Book Service</h2>

    <input type="range" min="1" max="10" value="1" id="bins" oninput="calcPrice()"/>
    <p id="price">Price: $15</p>

    <button onclick="book()" class="bg-emerald-500 w-full p-2 rounded mt-3">
      Book Service
    </button>
  </div>

  <!-- SCHEDULE -->
  <div class="glass mb-5">
    <h2 class="font-bold">Schedule</h2>
    <div id="schedule"></div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin" class="glass hidden">
    <h2 class="font-bold text-xl mb-2">Founder Hub</h2>
    <div id="users"></div>

    <hr class="my-4"/>

    <input id="broadcastText" placeholder="Broadcast message"/>
    <button onclick="broadcast()" class="bg-emerald-500 w-full p-2 rounded mt-2">
      Send Broadcast
    </button>
  </div>

  <!-- BROADCAST -->
  <div id="banner" class="hidden bg-emerald-600 p-3 text-center mt-5 rounded"></div>

</div>

<script>
/* EMAILJS CONFIG */
const MASTER_CONFIG = {
  sID: "service_6ymb279",
  tID: "template_pruo22c",
  pKey: "Or10zkajJK3CNcnic",
  owner: "favela23@gmail.com",
};

emailjs.init(MASTER_CONFIG.pKey);

/* STORAGE */
let users = JSON.parse(localStorage.getItem("users") || "[]");
let session = JSON.parse(localStorage.getItem("session") || "null");
let signup = false;

/* ADMIN CHECK */
function isAdmin(u){
  return (u.username === "Adrien" || u.username === "Cayde");
}

/* LOGIN */
function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(signup){
    const n = document.getElementById("name").value;
    const ph = document.getElementById("phone").value;

    users.push({username:u,password:p,name:n,phone:ph,schedule:[]});
    localStorage.setItem("users",JSON.stringify(users));
  }

  const found = users.find(x=>x.username===u && x.password===p)
    || (u==="Adrien"&&p==="favela23" ? {username:"Adrien"} :
        u==="Cayde"&&p==="arias9" ? {username:"Cayde"} : null);

  if(!found) return alert("Failed login");

  session = found;
  localStorage.setItem("session",JSON.stringify(session));
  load();
}

/* LOAD UI */
function load(){
  if(!session) return;

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  document.getElementById("welcome").innerText =
    "Welcome " + session.username;

  if(isAdmin(session)){
    document.getElementById("admin").classList.remove("hidden");
    renderUsers();
  }

  renderSchedule();
}

/* PRICE */
function calcPrice(){
  const bins = document.getElementById("bins").value;
  const price = 15 + (bins-1)*10;
  document.getElementById("price").innerText = "Price: $" + price;
}

/* BOOK */
function book(){
  const bins = document.getElementById("bins").value;
  const price = 15 + (bins-1)*10;

  session.schedule.push({
    bins,
    price,
    date: new Date().toString()
  });

  localStorage.setItem("session",JSON.stringify(session));

  emailjs.send(
    MASTER_CONFIG.sID,
    MASTER_CONFIG.tID,
    {
      to_email: MASTER_CONFIG.owner,
      user: session.username,
      bins,
      price
    }
  );

  alert("Booked!");
  renderSchedule();
}

/* SCHEDULE */
function renderSchedule(){
  const el = document.getElementById("schedule");
  if(!session.schedule) session.schedule = [];

  el.innerHTML = session.schedule.map(s=>
    `<div class="p-2 bg-slate-800 rounded mb-2">
      ${s.bins} bins - $${s.price}
    </div>`
  ).join("");
}

/* ADMIN USERS */
function renderUsers(){
  const el = document.getElementById("users");

  el.innerHTML = users.map(u=>
    `<div class="p-2 bg-slate-800 rounded mb-2">
      ${u.username}
      <button onclick="delUser('${u.username}')" class="text-red-400 float-right">X</button>
    </div>`
  ).join("");
}

function delUser(name){
  users = users.filter(u=>u.username!==name);
  localStorage.setItem("users",JSON.stringify(users));
  renderUsers();
}

/* BROADCAST */
function broadcast(){
  const msg = document.getElementById("broadcastText").value;
  const banner = document.getElementById("banner");

  banner.classList.remove("hidden");
  banner.innerText = msg;

  const url = new URL(window.location);
  url.searchParams.set("broadcast",msg);
  window.history.pushState({},'',url);
}

/* SIGNUP TOGGLE */
function toggleSignup(){
  signup = !signup;
  document.getElementById("signupBox").classList.toggle("hidden");
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("session");
  location.reload();
}

/* INIT */
load();
</script>

</body>
</html>
