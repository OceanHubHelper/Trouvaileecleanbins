<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bins System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
body{background:#020617;color:white;font-family:Arial}
.card{background:#0f172a;padding:15px;margin:10px;border-radius:12px;border:1px solid #1e293b}
input,select{width:100%;padding:8px;margin:5px 0;background:#0f172a;color:white;border:1px solid #334155}
.hidden{display:none}
button{cursor:pointer}
</style>
</head>

<body>

<div id="loginBox" class="card" style="max-width:350px;margin:40px auto;">
<h2>Login</h2>
<input id="u">
<input id="p" type="password">
<button onclick="login()" style="background:#10b981;width:100%;padding:10px">Login</button>
</div>

<div id="app" class="hidden">

<div class="card">
<h2>System</h2>
<button onclick="logout()" style="background:red;padding:6px">Logout</button>
</div>

<div class="card">
<h3>Book</h3>

<input id="address" placeholder="Address">

<input id="bins" type="range" min="1" max="10" value="1" oninput="calc()">
<p id="price">$15</p>

<select id="plan">
<option>One-Time</option>
<option>Monthly</option>
</select>

<button onclick="book()" style="background:#10b981;width:100%;padding:10px">
Book
</button>

</div>

<div class="card">
<h3>Schedule</h3>
<div id="schedule"></div>
</div>

<div id="admin" class="card hidden">
<h3>Admin</h3>
<div id="jobs"></div>
</div>

</div>

<script>

const CONFIG={
service:"service_6ymb279",
template:"template_pruo22c",
key:"Or10zkajJK3CNcnic"
};

emailjs.init(CONFIG.key);

let session=null;
let jobs=JSON.parse(localStorage.getItem("jobs")||"[]");

// SAFE INIT (prevents white screen crash)
function safeInit(){
try{
session=JSON.parse(localStorage.getItem("session"));

if(!session){
document.getElementById("loginBox").style.display="block";
document.getElementById("app").style.display="none";
return;
}

document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";

if(session.role==="Owner"){
document.getElementById("admin").classList.remove("hidden");
}

render();
}catch(e){
console.log("init error",e);
}
}
safeInit();

// LOGIN
function login(){
if(u.value==="Adrien" && p.value==="favela23"){
session={username:"Adrien",role:"Owner"};
}else{
session={username:u.value,role:"user"};
}
localStorage.setItem("session",JSON.stringify(session));
location.reload();
}

// LOGOUT
function logout(){
localStorage.removeItem("session");
location.reload();
}

// PRICE
function calc(){
price.innerText="$"+(15+(bins.value-1)*10);
}

// BOOK
function book(){
const job={
id:Date.now(),
user:session.username,
bins:bins.value,
plan:plan.value,
address:address.value,
status:"pending",
start:null
};

jobs.push(job);
localStorage.setItem("jobs",JSON.stringify(jobs));

try{
emailjs.send(CONFIG.service,CONFIG.template,{
user_name:session.username,
address:address.value,
plan:plan.value,
bin_amount:bins.value,
price:price.innerText
});
}catch(e){console.log(e);}

render();
}

// RENDER
function render(){

let userJobs=jobs.filter(j=>j.user===session.username);

schedule.innerHTML=userJobs.map(j=>`
<div class="card">
${j.plan}<br>
Bins: ${j.bins}<br>
Status: ${j.status}
</div>
`).join("");

jobsDiv.innerHTML=jobs.map(j=>`
<div class="card">
<b>${j.user}</b><br>
${j.plan}<br>
Bins:${j.bins}
</div>
`).join("");
}

</script>

</body>
</html>
