<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trouvaille Clean Bins | Elite Sanitization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        .tail-container * { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #064e3b 0%, #0f172a 100%); }
        .dropdown-content { display: none; }
        .show { display: block !important; }
        .owner-only { display: none; }
        .is-owner .owner-only { display: block; }
        
        input[type=range] { -webkit-appearance: none; background: #e2e8f0; border-radius: 99px; height: 8px; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%;
            background: #10b981; cursor: pointer; border: 3px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body class="tail-container bg-[#F8FAFC] text-slate-900 scroll-smooth">

<nav class="bg-white/90 backdrop-blur-md border-b border-slate-100 sticky top-0 z-[100]">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <img src="https://i.imgur.com/syOOmTK.png" alt="Logo" class="w-10 h-10">
            <h1 class="text-xl font-black text-slate-900 tracking-tighter uppercase">Trouvaille</h1>
        </div>

        <div class="relative">
            <button onclick="toggleDropdown()" class="flex items-center gap-2 p-1 pr-3 rounded-full border border-slate-200 bg-white hover:border-emerald-500 transition-all">
                <div id="nav-avatar" class="w-8 h-8 rounded-full bg-slate-800 text-white flex items-center justify-center font-bold text-xs">G</div>
                <span id="nav-user-name" class="text-sm font-bold text-slate-600">Guest</span>
            </button>
            <div id="profileDropdown" class="dropdown-content absolute right-0 mt-3 w-64 bg-white border border-slate-100 rounded-2xl shadow-2xl py-2 z-[110]">
                <button onclick="openModal('owner-panel')" class="owner-only w-full text-left px-4 py-2 hover:bg-emerald-50 text-sm font-bold text-emerald-700">🚀 Founder Dashboard</button>
                <hr class="owner-only">
                <button id="auth-action-btn" onclick="openAuthModal()" class="w-full text-left px-4 py-2 text-red-500 font-bold text-sm">Sign In</button>
            </div>
        </div>
    </div>
</nav>

<section id="plans" class="py-20 max-w-6xl mx-auto px-6">
    <div class="grid md:grid-cols-3 gap-8 items-start">
        
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
            <h4 class="font-bold text-slate-400 uppercase text-[10px] mb-2 tracking-widest">Single Wash</h4>
            <div id="single-price-display" class="text-4xl font-black mb-6">$15</div>
            <div class="mb-8">
                <label class="text-[10px] font-bold text-slate-400 uppercase block mb-4">How many bins?</label>
                <input type="range" id="bin-slider" min="1" max="10" value="1" oninput="updateSinglePrice()" class="w-full mb-2">
                <p id="bin-count-label" class="text-center text-sm font-bold text-emerald-600 italic">1 Bin Selected</p>
            </div>
            <button onclick="openBookingForm('Single Wash', true)" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black hover:bg-emerald-600 transition-all">Book Single</button>
        </div>

        <div class="bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl border-4 border-emerald-500 relative transform md:scale-105">
            <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-emerald-500 text-white px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter">Recommended</div>
            <h4 class="font-bold text-emerald-400 uppercase text-[10px] mb-2 tracking-widest">Monthly Elite</h4>
            <div class="text-4xl font-black text-white mb-6">$20<span class="text-sm text-slate-500">/mo</span></div>
            <button onclick="openBookingForm('Monthly Elite', false, 20)" class="w-full py-4 bg-emerald-50 text-emerald-900 rounded-2xl font-black hover:bg-emerald-400 hover:text-white transition-all">Subscribe Now</button>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
            <h4 class="font-bold text-slate-400 uppercase text-[10px] mb-2 tracking-widest">Bi-Monthly</h4>
            <div class="text-4xl font-black mb-2">$55</div>
            <p class="text-[10px] font-bold text-slate-400 mb-6 uppercase italic">3 Mo | 3 Washes/Mo</p>
            <button onclick="openBookingForm('Bi-Monthly Elite', false, 55)" class="w-full py-4 bg-slate-100 rounded-2xl font-bold hover:bg-slate-900 hover:text-white transition-all">Select Bi-Monthly</button>
        </div>

    </div>
</section>

<div id="owner-panel" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-xl flex items-center justify-center z-[200] p-4">
    <div class="bg-white rounded-[3rem] max-w-4xl w-full max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
        <div class="p-8 border-b flex justify-between items-center bg-slate-50">
            <h2 class="text-2xl font-black text-slate-900 italic uppercase">Founder Dashboard</h2>
            <button onclick="closeModal('owner-panel')" class="text-slate-300 hover:text-slate-900"><i class="fa-solid fa-circle-xmark text-2xl"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-8">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-100 text-slate-500 font-bold text-[10px] uppercase">
                    <tr><th class="p-4">Customer</th><th class="p-4">Subscription</th><th class="p-4 text-right">Actions</th></tr>
                </thead>
                <tbody id="owner-user-list"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="booking-modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center z-[200] p-4">
    <div class="bg-white p-10 rounded-[3rem] max-w-md w-full relative shadow-2xl">
        <button onclick="closeModal('booking-modal')" class="mb-4 text-slate-400 text-[10px] font-bold uppercase tracking-widest hover:text-emerald-600 transition-all">
            <i class="fa-solid fa-arrow-left mr-1"></i> Back
        </button>
        <h2 class="text-2xl font-black mb-2">Confirm Booking</h2>
        <p id="plan-label" class="text-emerald-600 font-bold text-xs mb-6 uppercase tracking-widest"></p>
        
        <form onsubmit="sendBooking(event)" class="space-y-4">
            <input id="form-name" required placeholder="Full Name" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
            <input id="form-address" required placeholder="Service Address" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
            <input id="form-phone" required placeholder="Phone Number" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
            <div class="bg-slate-900 p-8 rounded-3xl text-center">
                <p class="text-slate-400 text-[10px] font-bold uppercase mb-2">Total Due (Cash/Zelle)</p>
                <p id="modal-total" class="text-4xl font-black text-white">$15</p>
            </div>
            <button class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-emerald-700 transition-all">SEND ORDER 🧼</button>
        </form>
    </div>
</div>

<div id="auth-modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center z-[200] p-4">
    <div class="bg-white p-10 rounded-[2.5rem] max-w-sm w-full shadow-2xl relative">
        <button onclick="closeModal('auth-modal')" class="mb-4 text-slate-400 text-[10px] font-bold uppercase tracking-widest hover:text-emerald-600 transition-all">
            <i class="fa-solid fa-arrow-left"></i> Back
        </button>
        <h2 id="auth-title" class="text-2xl font-black mb-6">Sign In</h2>
        <input id="auth-user" placeholder="Username" class="w-full bg-slate-50 p-4 rounded-xl mb-3 outline-none">
        <input id="auth-email" placeholder="Email (New Users)" class="w-full bg-slate-50 p-4 rounded-xl mb-3 outline-none hidden">
        <input id="auth-pass" type="password" placeholder="Password" class="w-full bg-slate-50 p-4 rounded-xl mb-6 outline-none">
        <button onclick="handleAuth()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold shadow-lg">Continue</button>
        <button onclick="toggleAuthMode()" id="auth-toggle-btn" class="w-full text-slate-400 mt-6 text-[10px] font-bold uppercase text-center block">New? Create Profile</button>
    </div>
</div>

<script>
    emailjs.init("v-4sLf-EzCLBYcWe7"); 

    const OWNER_USERNAME = "owner"; 
    let currentUser = JSON.parse(localStorage.getItem('loggedUser')) || null;
    let currentSelectedPlan = "";
    let currentTotal = 15;

    function updateSinglePrice() {
        const bins = document.getElementById('bin-slider').value;
        const price = 15 + (bins - 1) * 10;
        document.getElementById('single-price-display').innerText = "$" + price;
        document.getElementById('bin-count-label').innerText = bins + (bins == 1 ? " Bin Selected" : " Bins Selected");
        currentTotal = price;
    }

    function openBookingForm(plan, isSingle, fixedPrice) {
        if (isSingle) {
            updateSinglePrice();
            const bins = document.getElementById('bin-slider').value;
            currentSelectedPlan = `Single Wash (${bins} Bins)`;
        } else {
            currentTotal = fixedPrice;
            currentSelectedPlan = plan;
        }
        document.getElementById('plan-label').innerText = currentSelectedPlan;
        document.getElementById('modal-total').innerText = "$" + currentTotal;
        if (currentUser) document.getElementById('form-name').value = currentUser.username;
        openModal('booking-modal');
    }

    function toggleDropdown() { document.getElementById("profileDropdown").classList.toggle("show"); }
    function openModal(id) { 
        if (id === 'owner-panel') renderOwnerList();
        document.getElementById(id).classList.remove('hidden'); 
    }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    function handleAuth() {
        const user = document.getElementById('auth-user').value.toLowerCase();
        if (!user) return;
        let users = JSON.parse(localStorage.getItem('users')) || [];
        const found = users.find(u => u.username === user);
        if (found && found.banned) return alert("Account Banned.");
        currentUser = found || { username: user, email: document.getElementById('auth-email').value, plan: "No Plan" };
        if (!found) { users.push(currentUser); localStorage.setItem('users', JSON.stringify(users)); }
        localStorage.setItem('loggedUser', JSON.stringify(currentUser));
        closeModal('auth-modal');
        updateUI();
    }

    function updateUI() {
        if (currentUser) {
            document.getElementById('nav-user-name').innerText = currentUser.username;
            document.getElementById('nav-avatar').innerText = currentUser.username.charAt(0).toUpperCase();
            if (currentUser.username === OWNER_USERNAME) document.body.classList.add('is-owner');
        }
    }

    async function sendBooking(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.innerText = "SENDING...";
        const params = {
            name: document.getElementById('form-name').value,
            address: document.getElementById('form-address').value,
            phone: document.getElementById('form-phone').value,
            plan: currentSelectedPlan,
            total: currentTotal,
            payment: "CASH / ZELLE"
        };
        try {
            await emailjs.send("service_6ymb279", "template_pruo22c", params);
            let users = JSON.parse(localStorage.getItem('users')) || [];
            const idx = users.findIndex(u => u.username === (currentUser ? currentUser.username : params.name));
            if (idx !== -1) { users[idx].plan = currentSelectedPlan; localStorage.setItem('users', JSON.stringify(users)); }
            alert("Booking Confirmed!");
            closeModal('booking-modal');
        } catch (err) { alert("Error sending booking."); }
        btn.innerText = "SEND ORDER 🧼";
    }

    function renderOwnerList() {
        const list = document.getElementById('owner-user-list');
        const users = JSON.parse(localStorage.getItem('users')) || [];
        list.innerHTML = "";
        users.forEach(u => {
            if (u.username === OWNER_USERNAME) return;
            list.innerHTML += `
                <tr class="border-t ${u.banned ? 'bg-red-50' : ''}">
                    <td class="p-4 font-bold">${u.username}</td>
                    <td class="p-4 text-xs font-bold text-emerald-600">${u.plan || 'No Plan'}</td>
                    <td class="p-4 text-right">
                        <button onclick="adminAction('${u.username}', 'ban')" class="text-red-600 font-black text-[10px] uppercase hover:underline">${u.banned ? 'Unban' : 'Ban'}</button>
                    </td>
                </tr>
            `;
        });
    }

    function adminAction(username, type) {
        let users = JSON.parse(localStorage.getItem('users')) || [];
        const idx = users.findIndex(u => u.username === username);
        if (idx !== -1 && type === 'ban') users[idx].banned = !users[idx].banned;
        localStorage.setItem('users', JSON.stringify(users));
        renderOwnerList();
    }

    function toggleAuthMode() {
        const isSignUp = document.getElementById('auth-email').classList.toggle('hidden');
        document.getElementById('auth-title').innerText = isSignUp ? "Sign In" : "Create Profile";
    }

    updateUI();
</script>
</body>
</html>
