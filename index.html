<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trouvaille Bins | OS v9.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        :root { --bg: #020617; --emerald: #10b981; --border: #1e293b; }
        * { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid var(--border); }
        .btn-tap { transition: all 0.1s ease; cursor: pointer; user-select: none; }
        .btn-tap:active { transform: scale(0.95); opacity: 0.8; }
        .strike { text-decoration: line-through; opacity: 0.3; font-size: 0.6em; margin-right: 5px; }
        .owner-only { display: none !important; }
        body.is-owner .owner-only { display: block !important; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Style for the Apple-style Datetime Picker */
        input[type="datetime-local"] {
            color-scheme: dark;
            background: #0f172a;
            border: 1px solid #1e293b;
            padding: 8px;
            border-radius: 12px;
            color: white;
            font-size: 12px;
        }
    </style>
</head>
<body class="pb-20">

    <div id="top-banner" class="hidden bg-emerald-600 text-white py-3 text-center text-[10px] font-black uppercase tracking-[0.2em] sticky top-0 z-[10000]">
        <span id="banner-text">System Active</span>
    </div>

    <nav class="p-6 glass sticky top-0 z-[9000] border-b border-slate-800">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic uppercase">Trouvaille <span class="text-emerald-500">Bins</span></h1>
            <div class="relative">
                <button onclick="toggleMenu()" class="btn-tap glass px-5 py-2 rounded-full border-slate-800 flex items-center gap-3">
                    <p id="u-name" class="text-[10px] font-black uppercase">Guest</p>
                    <div id="u-avatar" class="w-8 h-8 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center">
                        <i class="fa-solid fa-user text-[10px]"></i>
                    </div>
                </button>
                <div id="u-menu" class="hidden absolute right-0 mt-4 w-64 glass p-4 rounded-3xl shadow-2xl">
                    <div id="logged-in-area" class="hidden">
                        <button onclick="openModal('founder-panel')" class="owner-only w-full p-4 hover:bg-emerald-500/10 rounded-xl text-emerald-500 text-[10px] font-black uppercase mb-2">Founder Panel</button>
                        <button onclick="openModal('eta-modal')" class="w-full p-4 hover:bg-slate-800 rounded-xl text-white text-[10px] font-black uppercase mb-2">My ETA</button>
                        <button onclick="logout()" class="w-full p-4 text-red-500 text-[10px] font-black uppercase">Logout</button>
                    </div>
                    <div id="guest-area">
                        <button onclick="openModal('auth-modal')" class="w-full bg-emerald-500 py-4 rounded-xl text-white text-[10px] font-black">Login</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto text-center py-20 px-6">
        <h2 class="text-7xl font-black uppercase italic mb-6 tracking-tighter">Pure <span class="text-emerald-500">Logistics.</span></h2>
        <div class="flex justify-center gap-4">
            <a href="#logistics" class="bg-emerald-500 px-10 py-5 rounded-2xl font-black uppercase text-[10px]">Logistics</a>
            <button id="hero-login" onclick="openModal('auth-modal')" class="glass px-10 py-5 rounded-2xl font-black uppercase text-[10px]">Sign In</button>
        </div>
    </header>

    <section id="logistics" class="max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-8">
        <div class="glass p-10 rounded-[3rem]">
            <h4 class="text-2xl font-black italic mb-6 uppercase">Standard</h4>
            <div class="flex justify-between items-end mb-8">
                <span id="bin-count" class="text-4xl font-black">1 Bin</span>
                <div>
                    <span id="old-p1" class="strike hidden">$15</span>
                    <span id="new-p1" class="text-4xl font-black text-emerald-500">$15</span>
                </div>
            </div>
            <input type="range" id="r1" min="1" max="10" value="1" oninput="runPricing()" class="w-full h-2 bg-slate-800 rounded-lg appearance-none accent-emerald-500 cursor-pointer">
            <button onclick="book('Standard')" class="btn-tap w-full bg-white text-black py-6 rounded-2xl font-black uppercase text-[10px] mt-10">Request</button>
        </div>

        <div class="glass p-10 rounded-[3rem] border-emerald-500/30">
            <h4 class="text-2xl font-black italic mb-6 uppercase text-emerald-400">Elite Gold</h4>
            <span id="old-pg" class="strike hidden">$45</span>
            <p id="new-pg" class="text-8xl font-black leading-none">$45</p>
            <button onclick="book('Elite Gold')" class="btn-tap w-full bg-emerald-500 text-white py-6 rounded-2xl font-black uppercase text-[10px] mt-10">Subscribe</button>
        </div>
    </section>

    <div id="founder-panel" class="hidden fixed inset-0 bg-slate-950/98 z-[11000] p-4 flex items-center justify-center">
        <div class="glass w-full max-w-5xl h-[85vh] rounded-[3rem] flex flex-col overflow-hidden">
            <div class="p-8 border-b border-slate-800 flex gap-10">
                <button onclick="setTab('tab-users')" class="text-[10px] font-black uppercase text-emerald-500">Registry</button>
                <button onclick="setTab('tab-promo')" class="text-[10px] font-black uppercase text-slate-500">System Controls</button>
                <button onclick="closeModal('founder-panel')" class="ml-auto text-slate-500"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>

            <div class="flex-1 overflow-y-auto p-10">
                <div id="tab-users" class="tab-content active">
                    <div id="registry-grid" class="space-y-4">
                        </div>
                </div>

                <div id="tab-promo" class="tab-content">
                    <div class="max-w-md mx-auto space-y-8">
                        <div class="glass p-6 rounded-3xl">
                            <h5 class="text-[10px] font-black uppercase text-emerald-500 mb-4">Pricing Engine (%)</h5>
                            <input type="number" id="promo-in" class="w-full bg-slate-900 p-4 rounded-xl mb-4" placeholder="0">
                            <div class="flex gap-2">
                                <button onclick="applyP()" class="flex-1 bg-emerald-500 py-3 rounded-xl text-[10px] font-black uppercase">Apply</button>
                                <button onclick="killP()" class="flex-1 bg-red-600 py-3 rounded-xl text-[10px] font-black uppercase">Kill</button>
                            </div>
                        </div>
                        <div class="glass p-6 rounded-3xl">
                            <h5 class="text-[10px] font-black uppercase text-emerald-500 mb-4">Global Broadcast</h5>
                            <textarea id="msg-in" class="w-full bg-slate-900 p-4 rounded-xl mb-4 h-24" placeholder="Message..."></textarea>
                            <div class="flex gap-2">
                                <button onclick="applyB()" class="flex-1 bg-emerald-500 py-3 rounded-xl text-[10px] font-black uppercase">Push</button>
                                <button onclick="killB()" class="flex-1 bg-red-600 py-3 rounded-xl text-[10px] font-black uppercase">Kill</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 bg-slate-950/98 z-[12000] flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-10 rounded-[3.5rem] relative">
            <button onclick="closeModal('auth-modal')" class="absolute top-8 right-10 text-slate-500"><i class="fa-solid fa-xmark"></i></button>
            <h3 id="auth-title" class="text-center font-black uppercase italic mb-8">Access</h3>
            <div class="space-y-4">
                <div id="reg-fields" class="hidden space-y-4">
                    <input id="in-n" type="text" placeholder="Name" class="w-full bg-slate-900 p-4 rounded-xl">
                    <input id="in-ph" type="tel" placeholder="Phone" class="w-full bg-slate-900 p-4 rounded-xl">
                </div>
                <input id="in-u" type="text" placeholder="User" class="w-full bg-slate-900 p-4 rounded-xl">
                <input id="in-p" type="password" placeholder="Pass" class="w-full bg-slate-900 p-4 rounded-xl">
                <button onclick="handleAuth()" class="w-full bg-emerald-500 py-5 rounded-xl font-black uppercase text-[10px]">Initialize</button>
                <p onclick="toggleA()" class="text-center text-[9px] font-black text-slate-500 cursor-pointer mt-4">Switch Mode</p>
            </div>
        </div>
    </div>

    <div id="eta-modal" class="hidden fixed inset-0 bg-slate-950/98 z-[12000] flex items-center justify-center">
        <div class="glass p-12 rounded-[4rem] text-center w-72">
            <h3 class="text-[10px] font-black uppercase text-slate-500 mb-6">Your Dispatch</h3>
            <p id="eta-val" class="text-2xl font-black text-emerald-400">Pending</p>
            <button onclick="closeModal('eta-modal')" class="mt-10 text-[9px] font-black uppercase opacity-20">Close</button>
        </div>
    </div>

    <script>
        const API = { s: "service_6ymb279", t: "template_pruo22c", k: "Or10zkajJK3CNcnic", a: "favela23@gmail.com" };
        emailjs.init(API.k);

        let users = JSON.parse(localStorage.getItem('users')) || [];
        let session = JSON.parse(localStorage.getItem('session')) || null;
        let pRate = parseInt(localStorage.getItem('pRate')) || 0;
        let isReg = false;

        function start() {
            if(session) {
                document.getElementById('u-name').innerText = session.username;
                document.getElementById('hero-login').classList.add('hidden');
                document.getElementById('guest-area').classList.add('hidden');
                document.getElementById('logged-in-area').classList.remove('hidden');
                if(session.username === "Adrien") document.body.classList.add('is-owner');
                const me = users.find(u => u.username === session.username) || session;
                document.getElementById('eta-val').innerText = me.eta || "Not Scheduled";
            }
            
            const bMsg = localStorage.getItem('globalMsg');
            if(bMsg) {
                document.getElementById('top-banner').classList.remove('hidden');
                document.getElementById('banner-text').innerText = bMsg;
            }
            runPricing();
            renderUsers();
        }

        // PRICING
        function runPricing() {
            const count = document.getElementById('r1').value;
            const b1 = 15 + (count - 1) * 10;
            const bg = 45;
            const f1 = pRate > 0 ? (b1 * (1 - pRate/100)) : b1;
            const fg = pRate > 0 ? (bg * (1 - pRate/100)) : bg;

            document.getElementById('bin-count').innerText = `${count} Bin${count > 1 ? 's' : ''}`;
            if(pRate > 0) {
                document.getElementById('old-p1').innerText = `$${b1}`;
                document.getElementById('old-p1').classList.remove('hidden');
                document.getElementById('old-pg').innerText = `$${bg}`;
                document.getElementById('old-pg').classList.remove('hidden');
            } else {
                document.getElementById('old-p1').classList.add('hidden');
                document.getElementById('old-pg').classList.add('hidden');
            }
            document.getElementById('new-p1').innerText = `$${f1.toFixed(2)}`;
            document.getElementById('new-pg').innerText = `$${fg.toFixed(0)}`;
        }

        // AUTH
        function handleAuth() {
            const u = document.getElementById('in-u').value.trim();
            const p = document.getElementById('in-p').value.trim();
            if(!isReg) {
                if(u === "Adrien" && p === "favela23") return login({username: "Adrien", role: "Owner"});
                const found = users.find(x => x.username === u && x.password === p);
                if(found) login(found); else alert("Denied");
            } else {
                const n = document.getElementById('in-n').value;
                const ph = document.getElementById('in-ph').value;
                const newUser = { username: u, password: p, name: n, phone: ph, plan: "Standard", eta: "Not Set" };
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                login(newUser);
            }
        }

        function login(o) { localStorage.setItem('session', JSON.stringify(o)); location.reload(); }
        function logout() { localStorage.removeItem('session'); location.reload(); }

        // BOOKING
        async function book(tier) {
            if(!session) return openModal('auth-modal');
            const addr = prompt("Service Address:");
            if(!addr) return;
            const uData = users.find(u => u.username === session.username) || session;
            const pr = tier === "Elite Gold" ? document.getElementById('new-pg').innerText : document.getElementById('new-p1').innerText;
            try {
                await emailjs.send(API.s, API.t, {
                    to_email: API.a, user_name: session.username, legal_name: uData.name, 
                    user_phone: uData.phone, address: addr, plan: tier, price: pr, bins: document.getElementById('r1').value
                });
                alert("Request Logged.");
            } catch(e) { alert("Comms Error"); }
        }

        // OWNER TOOLS
        function applyP() { pRate = parseInt(document.getElementById('promo-in').value) || 0; localStorage.setItem('pRate', pRate); start(); }
        function killP() { pRate = 0; localStorage.removeItem('pRate'); start(); }
        function applyB() { const m = document.getElementById('msg-in').value; localStorage.setItem('globalMsg', m); start(); }
        function killB() { localStorage.removeItem('globalMsg'); location.reload(); }

        // REGISTRY (FIXED RENDERER)
        function renderUsers() {
            const grid = document.getElementById('registry-grid');
            if(!grid) return;
            grid.innerHTML = users.map(u => `
                <div class="glass p-6 rounded-2xl flex flex-wrap justify-between items-center gap-4">
                    <div>
                        <p class="font-black text-white uppercase text-sm">${u.username}</p>
                        <p class="text-[9px] font-black text-emerald-500 uppercase tracking-widest">${u.plan}</p>
                    </div>
                    <div class="flex gap-2 items-center flex-1 justify-end">
                        <button onclick="swapPlan('${u.username}')" class="bg-slate-800 px-4 py-3 rounded-xl text-[9px] font-black uppercase text-white">Swap Plan</button>
                        
                        <input type="datetime-local" id="dt-${u.username}" class="btn-tap">
                        
                        <button onclick="saveETA('${u.username}')" class="bg-emerald-500 p-3 rounded-xl text-white"><i class="fa-solid fa-check"></i></button>
                        <button onclick="trash('${u.username}')" class="text-red-500 px-2"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function swapPlan(un) {
            const i = users.findIndex(u => u.username === un);
            users[i].plan = users[i].plan === "Gold" ? "Standard" : "Gold";
            localStorage.setItem('users', JSON.stringify(users));
            renderUsers();
        }

        function saveETA(un) {
            const raw = document.getElementById(`dt-${un}`).value;
            if(!raw) return alert("Select Date/Time");
            
            const date = new Date(raw);
            const formatted = date.toLocaleDateString([], {month:'short', day:'numeric'}) + " @ " + date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            
            const i = users.findIndex(u => u.username === un);
            users[i].eta = formatted;
            localStorage.setItem('users', JSON.stringify(users));
            renderUsers();
            alert("Updated " + un);
        }

        function trash(un) { if(confirm("Delete?")) { users = users.filter(u => u.username !== un); localStorage.setItem('users', JSON.stringify(users)); renderUsers(); } }

        // UI
        function toggleMenu() { document.getElementById('u-menu').classList.toggle('hidden'); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function toggleA() { isReg = !isReg; document.getElementById('auth-title').innerText = isReg ? "Register" : "Access"; document.getElementById('reg-fields').classList.toggle('hidden', !isReg); }
        function setTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        start();
    </script>
</body>
</html>
