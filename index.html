<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trouvaille Elite | Management Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s ease-in-out; }
        .hero-gradient { background: linear-gradient(135deg, #064e3b 0%, #0f172a 100%); }
        .dropdown-content { display: none; position: absolute; right: 0; top: 100%; margin-top: 0.75rem; width: 15rem; background: white; border-radius: 1.25rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2); z-index: 110; border: 1px solid #f1f5f9; }
        .show { display: block !important; }
        .owner-only { display: none !important; }
        body.is-owner .owner-only { display: block !important; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { background: #10b981; color: white; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900">

<nav class="bg-white border-b border-slate-100 sticky top-0 z-[100]">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <img src="https://i.imgur.com/syOOmTK.png" class="w-10 h-10">
            <h1 class="text-xl font-black italic uppercase tracking-tighter">Trouvaille</h1>
        </div>
        <div class="relative">
            <button onclick="toggleDrop()" class="flex items-center gap-3 p-1.5 pr-4 rounded-full border border-slate-200 bg-white hover:border-emerald-500">
                <div id="u-av" class="w-8 h-8 rounded-full bg-slate-800 text-white flex items-center justify-center font-bold text-xs">G</div>
                <span id="u-nm" class="text-sm font-bold italic text-slate-700">Guest</span>
                <i class="fa-solid fa-chevron-down text-[10px] opacity-40"></i>
            </button>
            <div id="drop" class="dropdown-content overflow-hidden">
                <button onclick="openM('owner-modal')" class="owner-only w-full text-left px-5 py-4 hover:bg-emerald-50 text-sm font-black text-emerald-600 border-b">
                    <i class="fa-solid fa-crown mr-2"></i> FOUNDER PANEL
                </button>
                <button id="p-btn" onclick="openM('profile-modal')" class="hidden w-full text-left px-5 py-4 hover:bg-slate-50 text-sm font-bold text-slate-600 border-b">
                    <i class="fa-solid fa-user mr-2"></i> MY PROFILE
                </button>
                <button id="lo-btn" onclick="logout()" class="hidden w-full text-left px-5 py-4 hover:bg-red-50 text-sm font-bold text-red-500">
                    <i class="fa-solid fa-power-off mr-2"></i> SIGN OUT
                </button>
                <button id="li-btn" onclick="openM('auth-modal')" class="w-full text-left px-5 py-4 hover:bg-emerald-50 text-sm font-bold text-emerald-600">
                    <i class="fa-solid fa-circle-user mr-2"></i> SIGN IN
                </button>
            </div>
        </div>
    </div>
</nav>

<div id="owner-modal" class="hidden fixed inset-0 bg-slate-900/95 z-[500] flex items-center justify-center p-4">
    <div class="bg-white rounded-[2.5rem] w-full max-w-5xl max-h-[85vh] flex flex-col overflow-hidden shadow-2xl">
        <div class="p-8 border-b flex justify-between items-center bg-slate-50">
            <div class="flex gap-2">
                <button onclick="switchTab('tab-users')" id="btn-tab-users" class="tab-btn active px-6 py-2 rounded-full font-black text-xs uppercase italic">User Database</button>
                <button onclick="switchTab('tab-stats')" id="btn-tab-stats" class="tab-btn px-6 py-2 rounded-full font-black text-xs uppercase italic bg-slate-200 text-slate-500">Overview</button>
            </div>
            <button onclick="closeM('owner-modal')" class="text-slate-300 hover:text-red-500 text-2xl">×</button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-8">
            <div id="tab-users" class="tab-content active">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black uppercase italic text-lg text-emerald-600">Active Accounts</h3>
                    <input type="text" id="db-search" oninput="render()" placeholder="Search users..." class="bg-slate-100 px-4 py-2 rounded-lg text-sm font-bold outline-none border-2 border-transparent focus:border-emerald-500">
                </div>
                <table class="w-full text-left">
                    <thead class="text-[10px] uppercase font-black text-slate-400 border-b">
                        <tr>
                            <th class="pb-4 pl-2">User</th>
                            <th class="pb-4">Email</th>
                            <th class="pb-4">Current Plan</th>
                            <th class="pb-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="db-list">
                        </tbody>
                </table>
            </div>

            <div id="tab-stats" class="tab-content">
                <div class="grid grid-cols-3 gap-6">
                    <div class="bg-emerald-50 p-8 rounded-3xl border border-emerald-100">
                        <p class="text-[10px] font-black text-emerald-600 uppercase">Total Users</p>
                        <h4 id="stat-total" class="text-4xl font-black italic">0</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="auth-modal" class="hidden fixed inset-0 bg-slate-900/90 z-[500] flex items-center justify-center p-4">
    <div class="bg-white p-10 rounded-[3rem] w-full max-w-sm relative">
        <h2 id="a-tit" class="text-3xl font-black uppercase italic mb-8">Sign In</h2>
        <div class="space-y-4">
            <input id="a-u" placeholder="Username" class="w-full bg-slate-50 p-5 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-emerald-500">
            <input id="a-e" placeholder="Email" class="w-full bg-slate-50 p-5 rounded-2xl font-bold outline-none hidden">
            <input id="a-p" type="password" placeholder="Password" class="w-full bg-slate-50 p-5 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-emerald-500">
            <button onclick="handleAuth()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase italic shadow-lg">Submit</button>
            <button onclick="tAuth()" id="a-tgl" class="w-full text-slate-400 text-[10px] font-black uppercase mt-4 hover:text-emerald-500">Create Account</button>
        </div>
        <button onclick="closeM('auth-modal')" class="absolute top-8 right-8 text-slate-300 text-2xl hover:text-red-500">×</button>
    </div>
</div>

<script>
    const ADRIEN_ID = "Adrien";
    const ADRIEN_PW = "favela23";

    let currentUser = JSON.parse(localStorage.getItem('loggedUser')) || null;
    let isLogin = true;

    // --- Core UI Functions ---
    function get(id) { return document.getElementById(id); }
    function openM(id) { if(id === 'owner-modal') render(); get(id).classList.remove('hidden'); }
    function closeM(id) { get(id).classList.add('hidden'); }
    function toggleDrop() { get('drop').classList.toggle('show'); }

    // --- Tab Management ---
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active', 'bg-emerald-600', 'text-white');
            b.classList.add('bg-slate-200', 'text-slate-500');
        });
        get(tabId).classList.add('active');
        const activeBtn = get('btn-' + tabId);
        activeBtn.classList.add('active', 'bg-emerald-600', 'text-white');
        activeBtn.classList.remove('bg-slate-200', 'text-slate-500');
    }

    // --- Authentication ---
    function tAuth() {
        isLogin = !isLogin;
        get('a-tit').innerText = isLogin ? "Sign In" : "Register";
        get('a-e').classList.toggle('hidden', isLogin);
    }

    function handleAuth() {
        const u = get('a-u').value.trim();
        const p = get('a-p').value.trim();
        const e = get('a-e').value.trim();
        let users = JSON.parse(localStorage.getItem('users')) || [];

        if(isLogin) {
            if(u === ADRIEN_ID && p === ADRIEN_PW) {
                return login({ username: u, email: "founder@trouvaille.com", isOwner: true });
            }
            const found = users.find(x => x.username === u && x.password === p);
            if(found) login(found); else alert("Invalid Login");
        } else {
            if(!u || !p || !e) return alert("Fill everything!");
            if(users.find(x => x.username === u)) return alert("Username exists!");
            const newUser = { username: u, password: p, email: e, plan: "None" };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            login(newUser);
        }
    }

    function login(obj) {
        localStorage.setItem('loggedUser', JSON.stringify(obj));
        location.reload();
    }

    function logout() {
        localStorage.removeItem('loggedUser');
        location.reload();
    }

    // --- Founder Database Logic ---
    function render() {
        const users = JSON.parse(localStorage.getItem('users')) || [];
        const search = get('db-search').value.toLowerCase();
        const list = get('db-list');
        
        get('stat-total').innerText = users.length;

        const filtered = users.filter(u => u.username.toLowerCase().includes(search));

        list.innerHTML = filtered.length ? filtered.map(u => `
            <tr class="border-b hover:bg-slate-50">
                <td class="py-4 pl-2 font-black uppercase text-xs">${u.username}</td>
                <td class="py-4 text-slate-400 font-bold text-xs">${u.email}</td>
                <td class="py-4">
                    <select onchange="updateSub('${u.username}', this.value)" class="bg-emerald-50 text-emerald-700 font-black text-[10px] uppercase p-1 rounded-md outline-none border border-emerald-200">
                        <option value="None" ${u.plan === 'None' ? 'selected' : ''}>No Plan</option>
                        <option value="Single Wash" ${u.plan === 'Single Wash' ? 'selected' : ''}>Single</option>
                        <option value="Monthly" ${u.plan === 'Monthly' ? 'selected' : ''}>Monthly</option>
                        <option value="Bi-Monthly" ${u.plan === 'Bi-Monthly' ? 'selected' : ''}>Bi-Monthly</option>
                    </select>
                </td>
                <td class="py-4 text-right">
                    <button onclick="wipeAcc('${u.username}')" class="text-red-500 font-black text-[10px] uppercase hover:underline">
                        <i class="fa-solid fa-trash-can mr-1"></i> Delete
                    </button>
                </td>
            </tr>
        `).join('') : '<tr><td colspan="4" class="py-10 text-center font-bold text-slate-300 italic uppercase">No users found</td></tr>';
    }

    function updateSub(username, newPlan) {
        let users = JSON.parse(localStorage.getItem('users')) || [];
        const idx = users.findIndex(x => x.username === username);
        if(idx !== -1) {
            users[idx].plan = newPlan;
            localStorage.setItem('users', JSON.stringify(users));
            alert(`Updated ${username} to ${newPlan}`);
        }
    }

    function wipeAcc(username) {
        if(!confirm(`Are you sure you want to delete ${username}?`)) return;
        let users = JSON.parse(localStorage.getItem('users')) || [];
        const updated = users.filter(x => x.username !== username);
        localStorage.setItem('users', JSON.stringify(updated));
        render();
    }

    // --- Init ---
    function boot() {
        if(currentUser) {
            get('u-nm').innerText = currentUser.username;
            get('u-av').innerText = currentUser.username[0].toUpperCase();
            get('li-btn').classList.add('hidden');
            get('lo-btn').classList.remove('hidden');
            get('p-btn').classList.remove('hidden');
            if(currentUser.username === ADRIEN_ID || currentUser.isOwner) {
                document.body.classList.add('is-owner');
            }
        }
    }

    window.onclick = (e) => {
        if(!e.target.closest('.relative')) get('drop').classList.remove('show');
    };

    boot();
</script>
</body>
</html>
