<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trouvaille Elite | Founder Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.2s; }
        .hero-gradient { background: linear-gradient(135deg, #064e3b 0%, #0f172a 100%); }
        .dropdown-content { display: none; position: absolute; right: 0; top: 100%; width: 14rem; background: white; border-radius: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 100; border: 1px solid #eee; }
        .show { display: block !important; }
        .owner-only { display: none !important; }
        body.is-owner .owner-only { display: block !important; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900">

<nav class="bg-white border-b p-4 sticky top-0 z-[110]">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <h1 class="text-xl font-black italic uppercase">Trouvaille</h1>
        <div class="relative">
            <button onclick="toggleDrop()" class="flex items-center gap-2 border p-2 rounded-full px-4 bg-white">
                <div id="u-av" class="w-6 h-6 rounded-full bg-slate-800 text-white text-[10px] flex items-center justify-center">G</div>
                <span id="u-nm" class="text-xs font-bold uppercase italic">Guest</span>
            </button>
            <div id="drop" class="dropdown-content mt-2 overflow-hidden">
                <button onclick="openM('owner-modal')" class="owner-only w-full text-left p-4 hover:bg-emerald-50 text-xs font-black text-emerald-600 border-b">FOUNDER PANEL</button>
                <button id="p-btn" onclick="openM('profile-modal')" class="hidden w-full text-left p-4 hover:bg-slate-50 text-xs font-bold">MY PROFILE</button>
                <button id="lo-btn" onclick="logout()" class="hidden w-full text-left p-4 hover:bg-red-50 text-xs font-bold text-red-500">SIGN OUT</button>
                <button id="li-btn" onclick="openM('auth-modal')" class="w-full text-left p-4 hover:bg-emerald-50 text-xs font-bold">SIGN IN</button>
            </div>
        </div>
    </div>
</nav>

<div id="owner-modal" class="hidden fixed inset-0 bg-slate-900/95 z-[500] flex items-center justify-center p-4">
    <div class="bg-white rounded-[2rem] w-full max-w-4xl max-h-[80vh] flex flex-col overflow-hidden">
        <div class="p-6 border-b flex justify-between items-center">
            <div class="flex gap-2">
                <button onclick="showTab('users-tab')" class="bg-emerald-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">Users</button>
                <button onclick="showTab('settings-tab')" class="bg-slate-100 px-4 py-2 rounded-lg text-[10px] font-black uppercase">Stats</button>
            </div>
            <button onclick="closeM('owner-modal')" class="text-2xl">×</button>
        </div>
        <div class="p-6 overflow-y-auto">
            <div id="users-tab" class="tab-content active">
                <table class="w-full text-left text-xs">
                    <thead class="uppercase opacity-50 font-black border-b">
                        <tr><th class="pb-2">Name</th><th class="pb-2">Email</th><th class="pb-2">Plan</th><th class="pb-2 text-right">Action</th></tr>
                    </thead>
                    <tbody id="db-list"></tbody>
                </table>
            </div>
            <div id="settings-tab" class="tab-content">
                <p class="font-black italic">Account Stats Coming Soon...</p>
            </div>
        </div>
    </div>
</div>

<div id="book-modal" class="hidden fixed inset-0 bg-slate-900/90 z-[500] flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm relative">
        <h2 class="text-2xl font-black uppercase italic mb-4">Confirm Order</h2>
        <p id="b-plan" class="text-emerald-600 font-black text-xs mb-4 uppercase"></p>
        <input id="b-addr" placeholder="Address" class="w-full bg-slate-50 p-4 rounded-xl mb-4 font-bold outline-none border">
        <button id="b-sub" onclick="send()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-black uppercase">Submit</button>
        <button onclick="closeM('book-modal')" class="absolute top-4 right-4">×</button>
    </div>
</div>

<div id="auth-modal" class="hidden fixed inset-0 bg-slate-900/90 z-[500] flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm relative">
        <h2 id="a-tit" class="text-2xl font-black uppercase italic mb-6">Sign In</h2>
        <div class="space-y-4">
            <input id="a-u" placeholder="Username" class="w-full bg-slate-50 p-4 rounded-xl font-bold border outline-none">
            <input id="a-e" placeholder="Email" class="w-full bg-slate-50 p-4 rounded-xl font-bold border outline-none hidden">
            <input id="a-p" type="password" placeholder="Password" class="w-full bg-slate-50 p-4 rounded-xl font-bold border outline-none">
            <button onclick="auth()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-black uppercase">Submit</button>
            <button onclick="tAuth()" id="a-tgl" class="w-full text-slate-400 text-[10px] font-black uppercase mt-4">Create Account</button>
        </div>
    </div>
</div>

<section class="hero-gradient p-20 text-center text-white">
    <h1 class="text-4xl font-black uppercase italic mb-4">Trouvaille Elite</h1>
    <p class="opacity-70 mb-10">Bin sanitization at its peak.</p>
    <div class="grid md:grid-cols-2 gap-4 max-w-2xl mx-auto">
        <div class="bg-white text-slate-900 p-8 rounded-3xl">
            <h3 class="font-black text-xs uppercase opacity-50 mb-2">Single Wash</h3>
            <p class="text-3xl font-black mb-4">$15</p>
            <button onclick="book('Single Wash')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Select</button>
        </div>
        <div class="bg-emerald-500 p-8 rounded-3xl">
            <h3 class="font-black text-xs uppercase text-emerald-100 mb-2">Monthly</h3>
            <p class="text-3xl font-black mb-4">$20</p>
            <button onclick="book('Monthly Elite')" class="w-full bg-white text-emerald-600 py-3 rounded-xl font-bold">Select</button>
        </div>
    </div>
</section>

<script>
    // --- CREDENTIALS SWAP ---
    const PUB_KEY = "Service_6ymb279"; // As you specified: Service ID is Public Key
    const SERV_ID = "v-4sLf-EzCLBYcWe7"; 
    const T_OWNER = "template_pruo22c";
    const T_CUST = "template_4hi1opb";

    let user = JSON.parse(localStorage.getItem('loggedUser')) || null;
    let isLog = true;
    let selPlan = "";

    function boot() {
        emailjs.init(PUB_KEY);
        if(user) {
            document.getElementById('u-nm').innerText = user.username;
            document.getElementById('u-av').innerText = user.username[0].toUpperCase();
            document.getElementById('li-btn').style.display = 'none';
            document.getElementById('lo-btn').style.display = 'block';
            document.getElementById('p-btn').style.display = 'block';
            if(user.username === "Adrien") document.body.classList.add('is-owner');
        }
    }

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'users-tab') render();
    }

    function render() {
        const users = JSON.parse(localStorage.getItem('users')) || [];
        const list = document.getElementById('db-list');
        list.innerHTML = users.length ? users.map(u => `
            <tr class="border-b">
                <td class="py-4 font-black uppercase">${u.username}</td>
                <td class="py-4 opacity-60">${u.email}</td>
                <td class="py-4">
                    <select onchange="updSub('${u.username}', this.value)" class="bg-emerald-50 p-1 rounded text-[10px] font-black uppercase">
                        <option value="None" ${u.plan==='None'?'selected':''}>None</option>
                        <option value="Single" ${u.plan==='Single'?'selected':''}>Single</option>
                        <option value="Monthly" ${u.plan==='Monthly'?'selected':''}>Monthly</option>
                    </select>
                </td>
                <td class="py-4 text-right"><button onclick="del('${u.username}')" class="text-red-500 font-black">DELETE</button></td>
            </tr>`).join('') : '<tr><td colspan="4" class="py-10 text-center opacity-30 font-bold italic">DATABASE EMPTY</td></tr>';
    }

    function updSub(n, p) {
        let list = JSON.parse(localStorage.getItem('users')) || [];
        let i = list.findIndex(x => x.username === n);
        if(i !== -1) { list[i].plan = p; localStorage.setItem('users', JSON.stringify(list)); }
    }

    function del(n) {
        if(!confirm("Delete account?")) return;
        let list = JSON.parse(localStorage.getItem('users')) || [];
        localStorage.setItem('users', JSON.stringify(list.filter(x => x.username !== n)));
        render();
    }

    async function send() {
        const ad = document.getElementById('b-addr').value;
        if(!ad) return alert("Missing address");
        const btn = document.getElementById('b-sub');
        btn.innerText = "SENDING...";
        btn.disabled = true;

        const p = { user_name: user.username, user_email: user.email, plan_selected: selPlan, address: ad, to_email: "favela23@gmail.com" };

        try {
            await emailjs.send(SERV_ID, T_OWNER, p);
            await emailjs.send(SERV_ID, T_CUST, p);
            alert("Order Success!");
            location.reload();
        } catch (e) {
            alert("Email Fail: Check IDs");
            btn.innerText = "SUBMIT";
            btn.disabled = false;
        }
    }

    function tAuth() { isLog = !isLog; document.getElementById('a-tit').innerText = isLog ? "Sign In" : "Register"; document.getElementById('a-e').classList.toggle('hidden', isLog); }
    function auth() {
        const u = document.getElementById('a-u').value.trim();
        const p = document.getElementById('a-p').value.trim();
        const e = document.getElementById('a-e').value.trim();
        let list = JSON.parse(localStorage.getItem('users')) || [];

        if(isLog) {
            if(u === "Adrien" && p === "favela23") login({username:u, email:"founder@trouvaille.com"});
            else { const f = list.find(x => x.username === u && x.password === p); if(f) login(f); else alert("Wrong Login"); }
        } else {
            const n = {username:u, password:p, email:e, plan:"None"};
            list.push(n);
            localStorage.setItem('users', JSON.stringify(list));
            login(n);
        }
    }

    function login(o) { localStorage.setItem('loggedUser', JSON.stringify(o)); location.reload(); }
    function logout() { localStorage.removeItem('loggedUser'); location.reload(); }
    function openM(id) { if(id==='owner-modal') render(); document.getElementById(id).classList.remove('hidden'); }
    function closeM(id) { document.getElementById(id).classList.add('hidden'); }
    function toggleDrop() { document.getElementById('drop').classList.toggle('show'); }
    function book(p) { if(!user) return openM('auth-modal'); selPlan = p; document.getElementById('b-plan').innerText = p; openM('book-modal'); }

    boot();
</script>
</body>
</html>
