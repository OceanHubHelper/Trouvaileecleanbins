<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trouvaille Bins</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#020617;
    color:white;
}
.glass {
    background:rgba(15,23,42,0.9);
    border:1px solid #1e293b;
    border-radius:20px;
    padding:20px;
}
.btn {
    padding:15px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- EMAILJS -->
<script>
const EMAIL = {
    serviceID: "service_6ymb279",
    templateID: "template_pruo22c",
    publicKey: "Or10zkajJK3CNcnic"
};
emailjs.init(EMAIL.publicKey);
</script>

<!-- SESSION -->
<script>
let user = JSON.parse(localStorage.getItem("session")) || null;
let users = JSON.parse(localStorage.getItem("users")) || [];

function saveSession(u){
    localStorage.setItem("session", JSON.stringify(u));
    location.reload();
}

function logout(){
    localStorage.removeItem("session");
    location.reload();
}
</script>

<!-- NAV -->
<div class="glass flex justify-between items-center m-4">
    <h1 class="font-bold">Trouvaille Bins</h1>

    <div>
        <button onclick="openLogin()" class="btn bg-emerald-500">Login</button>
        <button onclick="logout()" class="btn bg-red-500">Logout</button>
    </div>
</div>

<!-- MAIN -->
<div class="p-6 text-center">

<h1 class="text-3xl font-bold mb-4">Book a Bin Clean</h1>

<button class="btn bg-emerald-500 m-2" onclick="book('One-Time')">
One-Time Clean ($15)
</button>

<button class="btn bg-blue-500 m-2" onclick="book('Monthly Plan')">
Monthly Plan ($45)
</button>

</div>

<!-- LOGIN -->
<div id="login" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
<div class="glass w-80">

<h2 class="text-xl mb-3">Login</h2>

<input id="u" placeholder="username" class="w-full p-2 mb-2 text-black"/>
<input id="p" placeholder="password" type="password" class="w-full p-2 mb-2 text-black"/>

<button class="btn bg-emerald-500 w-full" onclick="login()">Enter</button>
<button class="btn bg-red-500 w-full mt-2" onclick="closeLogin()">Close</button>

</div>
</div>

<script>
function openLogin(){ document.getElementById("login").classList.remove("hidden"); }
function closeLogin(){ document.getElementById("login").classList.add("hidden"); }

function login(){
    const u = document.getElementById("u").value;
    const p = document.getElementById("p").value;

    if(u === "Adrien" && p === "favela23"){
        saveSession({
            username:"Adrien",
            name:"Founder",
            contact_information:"Admin",
            role:"Owner"
        });
        return;
    }

    const found = users.find(x=>x.username===u && x.password===p);
    if(!found) return alert("bad login");

    saveSession({...found, role:"User"});
}
</script>

<!-- BOOKING -->
<script>
async function book(plan){
    if(!user) return alert("login first");

    const addr = prompt("address?");
    if(!addr) return;

    const price = plan==="Monthly Plan" ? "$45" : "$15";
    const bins = plan==="Monthly Plan" ? "6" : "1";

    try {
        await emailjs.send(
            EMAIL.serviceID,
            EMAIL.templateID,
            {
                legal_name: user.name,
                contact_information: user.contact_information,
                user_name: user.username,
                address: addr,
                plan: plan,
                bin_amount: bins,
                price: price,
                eta_request: new Date().toString()
            }
        );

        alert("Order sent!");
    } catch(e){
        alert("failed");
    }
}
</script>

</body>
</html>
