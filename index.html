<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trouvaille Clean Bins | Founder Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        .tail-container * { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #064e3b 0%, #0f172a 100%); }
        .dropdown-content { display: none; position: absolute; right: 0; top: 100%; margin-top: 0.75rem; width: 15rem; background: white; border: 1px solid #f1f5f9; border-radius: 1.25rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); z-index: 110; }
        .show { display: block !important; }
        
        /* The Secret Sauce for the Owner Panel */
        .owner-only { display: none !important; }
        body.is-owner .owner-only { display: block !important; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>

<body class="tail-container bg-[#F8FAFC] text-slate-900 scroll-smooth">

<nav class="bg-white border-b border-slate-100 sticky top-0 z-[100]">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <img src="https://i.imgur.com/syOOmTK.png" alt="Logo" class="w-10 h-10">
            <h1 class="text-xl font-black text-slate-900 tracking-tighter uppercase italic">Trouvaille</h1>
        </div>

        <div class="relative">
            <button onclick="toggleDropdown(event)" class="flex items-center gap-3 p-1.5 pr-4 rounded-full border border-slate-200 bg-white">
                <div id="nav-avatar" class="w-8 h-8 rounded-full bg-slate-800 text-white flex items-center justify-center font-extrabold text-xs">G</div>
                <span id="nav-user-name" class="text-sm font-bold text-slate-700 italic">Guest</span>
                <i class="fa-solid fa-chevron-down text-[10px] opacity-40"></i>
            </button>
            
            <div id="profileDropdown" class="dropdown-content overflow-hidden">
                <button onclick="openModal('owner-panel')" class="owner-only w-full text-left px-5 py-4 hover:bg-emerald-50 text-sm font-black text-emerald-600 border-b">
                    <i class="fa-solid fa-crown mr-2"></i> FOUNDER PANEL
                </button>
                <button id="logout-btn" onclick="logout()" class="hidden w-full text-left px-5 py-4 hover:bg-red-50 text-sm font-bold text-red-500">
                    <i class="fa-solid fa-power-off mr-2"></i> Sign Out
                </button>
                <button id="login-btn" onclick="openModal('auth-modal')" class="w-full text-left px-5 py-4 hover:bg-emerald-50 text-sm font-bold text-emerald-600">
                    <i class="fa-solid fa-circle-user mr-2"></i> Sign In
                </button>
            </div>
        </div>
    </div>
</nav>

<section class="hero-gradient pt-20 pb-32 text-center text-white px-6">
    <h1 class="text-5xl md:text-7xl font-black mb-6 uppercase italic">Elite Bin Care</h1>
    <p class="text-slate-300 mb-8 italic">Sanitize your bins. Protect your home.</p>
    <button onclick="checkAuthAndScroll()" class="bg-emerald-500 px-10 py-4 rounded-xl font-black">GET STARTED</button>
</section>

<div id="owner-panel" class="hidden fixed inset-0 bg-slate-900/95 backdrop-blur-xl flex items-center justify-center z-[500] p-4">
    <div class="bg-white rounded-[2rem] max-w-4xl w-full max-h-[85vh] flex flex-col overflow-hidden">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <h2 class="font-black uppercase italic text-emerald-600">Founder Database</h2>
            <button onclick="closeModal('owner-panel')" class="text-slate-400 hover:text-red-500 text-2xl"><i class="fa-solid fa-circle-xmark"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-6">
            <table class="w-full text-left">
                <thead class="text-[10px] uppercase font-black text-slate-400 border-b">
                    <tr><th class="pb-4">Username</th><th class="pb-4">Email</th><th class="pb-4 text-right">Action</th></tr>
                </thead>
                <tbody id="owner-user-list">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div id="auth-modal" class="hidden fixed inset-0 bg-slate-900/95 flex items-center justify-center z-[600] p-4">
    <div class="bg-white p-8 rounded-[2rem] max-w-sm w-full relative">
        <h2 id="auth-title" class="text-2xl font-black mb-6 uppercase italic">Sign In</h2>
        <div class="space-y-4">
            <input id="auth-user" placeholder="Username" class="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none">
            <input id="auth-email" placeholder="Email" class="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none hidden">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none">
            <button onclick="handleAuth()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-black uppercase">Continue</button>
            <button onclick="toggleAuthMode()" id="auth-toggle-btn" class="w-full text-slate-400 text-xs font-bold uppercase mt-4">Create Account</button>
        </div>
        <button onclick="closeModal('auth-modal')" class="absolute top-6 right-6 text-slate-300">×</button>
    </div>
</div>

<script>
    emailjs.init("v-4sLf-EzCLBYcWe7");
    const OWNER_ID = "Adrien";
    const OWNER_PASS = "favela23";

    let currentUser = JSON.parse(localStorage.getItem('loggedUser')) || null;
    let isLoginMode = true;

    function toggleDropdown(e) { e.stopPropagation(); document.getElementById("profileDropdown").classList.toggle("show"); }
    window.onclick = () => { document.getElementById("profileDropdown").classList.remove('show'); };
    
    function openModal(id) { 
        if (id === 'owner-panel') renderOwnerList();
        document.getElementById(id).classList.remove('hidden'); 
    }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Sign In" : "Register";
        document.getElementById('auth-email').classList.toggle('hidden', isLoginMode);
        document.getElementById('auth-toggle-btn').innerText = isLoginMode ? "Create Account" : "I have an account";
    }

    function handleAuth() {
        const u = document.getElementById('auth-user').value.trim();
        const p = document.getElementById('auth-pass').value.trim();
        const e = document.getElementById('auth-email').value.trim();
        
        // Load the most recent user list
        let users = JSON.parse(localStorage.getItem('users')) || [];

        if (isLoginMode) {
            // Check Owner First
            if (u === OWNER_ID && p === OWNER_PASS) {
                return login({ username: u, isOwner: true });
            }
            // Check Users
            const found = users.find(x => x.username === u && x.password === p);
            if (found) login(found); else alert("Invalid Login.");
        } else {
            // Register
            if (!u || !p || !e) return alert("Fill all fields.");
            if (users.find(x => x.username === u)) return alert("Username taken.");
            
            const newUser = { username: u, password: p, email: e };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users)); // Save to master list
            login(newUser);
        }
    }

    function login(u) {
        localStorage.setItem('loggedUser', JSON.stringify(u));
        location.reload(); 
    }

    function logout() {
        localStorage.removeItem('loggedUser');
        location.reload();
    }

    function renderOwnerList() {
        const users = JSON.parse(localStorage.getItem('users')) || [];
        const list = document.getElementById('owner-user-list');
        
        if (users.length === 0) {
            list.innerHTML = `<tr><td colspan="3" class="py-10 text-center text-slate-400 font-bold">No registered accounts found.</td></tr>`;
            return;
        }

        list.innerHTML = users.map(u => `
            <tr class="border-b hover:bg-slate-50 transition-colors">
                <td class="py-4 font-black uppercase text-xs">${u.username}</td>
                <td class="py-4 text-slate-400 font-bold text-xs">${u.email}</td>
                <td class="py-4 text-right">
                    <button onclick="deleteUser('${u.username}')" class="bg-red-50 text-red-500 px-3 py-1 rounded-lg text-[10px] font-black uppercase hover:bg-red-500 hover:text-white">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    function deleteUser(username) {
        if (!confirm(`Permanently delete ${username}?`)) return;
        let users = JSON.parse(localStorage.getItem('users')) || [];
        const updated = users.filter(x => x.username !== username);
        localStorage.setItem('users', JSON.stringify(updated));
        renderOwnerList(); // Refresh list immediately
    }

    function init() {
        if (currentUser) {
            document.getElementById('nav-user-name').innerText = currentUser.username;
            document.getElementById('nav-avatar').innerText = currentUser.username[0].toUpperCase();
            document.getElementById('login-btn').classList.add('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            
            // Critical: Enable Owner Panel for Adrien
            if (currentUser.username === OWNER_ID || currentUser.isOwner === true) {
                document.body.classList.add('is-owner');
            }
        }
    }

    init();
</script>

</body>
</html>
