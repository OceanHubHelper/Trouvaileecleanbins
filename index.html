<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trouvaille Bins | Elite Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        :root { --bg: #020617; --card: #0f172a; --text: #f8fafc; --border: #1e293b; --accent: #10b981; }
        .light-mode { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; --accent: #059669; }
        * { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; scroll-behavior: smooth; }
        body { background-color: var(--bg); color: var(--text); margin: 0; min-height: 100vh; }
        .glass-card { background-color: var(--card); border: 1px solid var(--border); }
        .owner-only { display: none !important; }
        body.is-owner .owner-only { display: block !important; }
        .dropdown { display: none; position: absolute; right: 0; top: 115%; width: 16rem; background: var(--card); border: 1px solid var(--border); border-radius: 1rem; z-index: 100; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .show { display: block !important; }
        input[type=range] { -webkit-appearance: none; background: #334155; height: 6px; border-radius: 5px; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #10b981; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body>

<nav class="sticky top-0 z-[100] border-b border-slate-800/20 bg-inherit backdrop-blur-md p-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <h1 class="text-xl font-extrabold italic uppercase tracking-tighter">Trouvaille Bins</h1>
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="text-lg hover:text-emerald-500"><i class="fa-solid fa-circle-half-stroke"></i></button>
            <div class="relative">
                <button onclick="toggleDrop()" class="flex items-center gap-3 glass-card p-2 px-4 rounded-full">
                    <span id="nav-name" class="text-[10px] font-bold uppercase opacity-60 tracking-widest">Guest</span>
                    <img id="nav-img" src="https://ui-avatars.com/api/?name=?&background=10b981&color=fff" class="w-8 h-8 rounded-full">
                </button>
                <div id="drop" class="dropdown overflow-hidden">
                    <button onclick="openM('owner-panel')" class="owner-only w-full text-left p-4 hover:bg-emerald-500/10 text-[10px] font-black text-emerald-500 border-b border-slate-800/20 uppercase">Founder Panel</button>
                    <button id="lo-btn" onclick="logout()" class="hidden w-full text-left p-4 hover:bg-red-500/10 text-[10px] font-bold text-red-500 uppercase">Sign Out</button>
                    <button id="li-btn" onclick="openM('auth-modal')" class="w-full text-left p-4 hover:bg-emerald-500/10 text-[10px] font-bold text-emerald-500 uppercase">Sign In</button>
                </div>
            </div>
        </div>
    </div>
</nav>

<header class="pt-24 pb-16 px-6 text-center">
    <h2 class="text-5xl md:text-7xl font-black italic uppercase leading-none mb-6">Pristine Bins.<br><span class="text-emerald-500">Elite Care.</span></h2>
    <p class="opacity-60 text-lg mb-10 max-w-xl mx-auto">Professional curb-side sanitization. No odors. No bacteria.</p>
    <button onclick="document.getElementById('plans').scrollIntoView()" class="bg-emerald-500 text-white px-10 py-4 rounded-xl font-black uppercase text-xs shadow-lg hover:scale-105">Book a Wash</button>
</header>

<section id="client-dashboard" class="hidden py-10 max-w-4xl mx-auto px-6">
    <div class="glass-card p-8 rounded-[2rem] border-emerald-500/30 bg-emerald-500/5">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h3 class="text-xs font-black uppercase text-emerald-500 mb-1">Service Status</h3>
                <h4 id="dash-welcome" class="text-xl font-black italic uppercase">Welcome!</h4>
            </div>
            <div class="text-center md:text-right">
                <p class="text-[10px] font-bold uppercase opacity-50">Next Scheduled Wash</p>
                <div id="dash-time" class="text-lg font-black text-emerald-500">Awaiting Assignment</div>
            </div>
        </div>
    </div>
</section>

<section id="plans" class="py-16 max-w-5xl mx-auto px-6 text-center">
    <div class="grid md:grid-cols-2 gap-8">
        <div class="glass-card p-10 rounded-[2.5rem] text-left">
            <h4 class="text-xl font-black uppercase italic mb-4">Single Wash</h4>
            <div class="mb-8">
                <div class="flex justify-between items-end mb-4"><span id="bin-display" class="text-2xl font-black">1 Bin</span><span id="single-price" class="text-2xl font-black text-emerald-500">$15</span></div>
                <input type="range" id="bin-slider" min="1" max="5" value="1" oninput="updPrc()">
            </div>
            <button onclick="book('Single Wash')" class="w-full bg-emerald-500 text-white py-4 rounded-xl font-black uppercase text-[10px]">Confirm Single</button>
        </div>
        <div class="bg-emerald-600 p-10 rounded-[2.5rem] text-left text-white">
            <h4 class="text-xl font-black uppercase italic mb-4">Monthly Elite</h4>
            <div class="text-4xl font-black mb-8">$20 <span class="text-sm font-normal opacity-70">/mo</span></div>
            <button onclick="book('Monthly Elite')" class="w-full bg-white text-emerald-600 py-4 rounded-xl font-black uppercase text-[10px]">Start Subscription</button>
        </div>
    </div>
</section>

<div id="auth-modal" class="hidden fixed inset-0 bg-black/90 z-[500] flex items-center justify-center p-4">
    <div class="glass-card p-8 rounded-[2rem] w-full max-w-sm relative">
        <h2 id="a-tit" class="text-2xl font-black uppercase italic mb-6 text-center">Sign In</h2>
        <div class="space-y-3">
            <input id="a-u" placeholder="Username" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none">
            <div id="reg-fields" class="hidden space-y-3">
                <input id="a-ph" placeholder="Phone Number" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none">
            </div>
            <input id="a-p" type="password" placeholder="Passcode" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none">
            <button onclick="auth()" class="w-full bg-emerald-500 text-white py-4 rounded-xl font-black uppercase">Continue</button>
            <button onclick="tAuth()" id="a-tgl" class="w-full opacity-50 text-[10px] font-black uppercase mt-4">No account? Sign Up</button>
        </div>
        <button onclick="closeM('auth-modal')" class="absolute top-6 right-6 opacity-40 text-xl">&times;</button>
    </div>
</div>

<div id="book-modal" class="hidden fixed inset-0 bg-black/95 z-[500] flex items-center justify-center p-4">
    <div class="glass-card p-8 rounded-[2rem] w-full max-w-sm relative">
        <h2 class="text-xl font-black uppercase italic mb-2">Checkout</h2>
        <p id="b-summary" class="text-emerald-500 font-black text-[10px] uppercase mb-6"></p>
        <input id="b-addr" placeholder="Service Address" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl mb-4 outline-none">
        <button id="b-sub" onclick="handleOrder()" class="w-full bg-emerald-500 text-white py-4 rounded-xl font-black uppercase">Request Wash</button>
        <button onclick="closeM('book-modal')" class="absolute top-6 right-6 opacity-40 text-xl">&times;</button>
    </div>
</div>

<div id="owner-panel" class="hidden fixed inset-0 bg-black/98 z-[500] flex items-center justify-center p-4">
    <div class="glass-card rounded-[2rem] w-full max-w-5xl h-[80vh] flex flex-col overflow-hidden">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <h2 class="font-black uppercase text-emerald-500">Founder Dashboard</h2>
            <button onclick="closeM('owner-panel')" class="opacity-40 text-2xl">&times;</button>
        </div>
        <div class="flex-1 overflow-auto p-6">
            <table class="w-full text-left text-xs">
                <thead class="uppercase opacity-40 font-bold border-b border-slate-800">
                    <tr><th class="pb-4">Client</th><th class="pb-4">Phone</th><th class="pb-4">Schedule</th><th class="pb-4 text-right">Action</th></tr>
                </thead>
                <tbody id="db-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- CORE CONFIGURATION ---
    const E_PUB = "Or10zkajJK3CNcnic"; 
    const E_SER = "service_6ymb279"; 
    const T_OWN = "template_pruo22c"; 

    (function(){ emailjs.init(E_PUB); })();

    let currentUser = JSON.parse(localStorage.getItem('loggedUser')) || null;
    let isLogin = true;
    let activePlan = "";
    let activePrice = "";

    function boot() {
        if(!localStorage.getItem('users')) localStorage.setItem('users', JSON.stringify([]));
        if(currentUser) {
            document.getElementById('nav-name').innerText = currentUser.username;
            document.getElementById('li-btn').classList.add('hidden');
            document.getElementById('lo-btn').classList.remove('hidden');
            document.getElementById('client-dashboard').classList.remove('hidden');
            document.getElementById('dash-welcome').innerText = `Hi, ${currentUser.username}!`;
            document.getElementById('dash-time').innerText = currentUser.schedule || "Not Assigned Yet";
            if(currentUser.username === "Adrien") document.body.classList.add('is-owner');
        }
    }

    async function handleOrder() {
        const addr = document.getElementById('b-addr').value;
        const btn = document.getElementById('b-sub');
        if(!addr) return alert("Address required.");
        
        btn.innerText = "Processing..."; btn.disabled = true;

        const data = {
            user_name: currentUser.username,
            user_contact: currentUser.phone || "No phone",
            plan_selected: activePlan,
            price: activePrice,
            address: addr,
            to_email: "favela23@gmail.com" // Sending directly to your inbox
        };

        try {
            await emailjs.send(E_SER, T_OWN, data);
            alert("Order Success! Adrien will contact you.");
            location.reload();
        } catch (e) {
            alert("Error: " + (e.text || "Connection Issue"));
            btn.innerText = "Request Wash"; btn.disabled = false;
        }
    }

    // --- DASHBOARD LOGIC ---
    function renderDB() {
        const users = JSON.parse(localStorage.getItem('users'));
        document.getElementById('db-list').innerHTML = users.map(u => `
            <tr class="border-b border-slate-800/50">
                <td class="py-4 font-bold uppercase">${u.username}</td>
                <td class="py-4 opacity-60">${u.phone || 'N/A'}</td>
                <td class="py-4">
                    <input type="datetime-local" id="sch-${u.username}" value="${u.schedule_val || ''}" class="bg-slate-900 border border-slate-800 p-1 rounded text-[10px]">
                    <button onclick="setSchedule('${u.username}')" class="bg-emerald-500 text-white px-2 py-1 rounded text-[10px] font-bold">Set</button>
                </td>
                <td class="py-4 text-right"><button onclick="del('${u.username}')" class="text-red-500 font-bold uppercase text-[10px]">Wipe</button></td>
            </tr>`).join('');
    }

    function setSchedule(userKey) {
        let users = JSON.parse(localStorage.getItem('users'));
        const idx = users.findIndex(u => u.username === userKey);
        const input = document.getElementById('sch-' + userKey);
        if(!input.value) return;
        const d = new Date(input.value);
        users[idx].schedule = d.toLocaleString([], {month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'});
        users[idx].schedule_val = input.value;
        localStorage.setItem('users', JSON.stringify(users));
        alert("Schedule Saved"); renderDB();
    }

    function auth() {
        const u = document.getElementById('a-u').value.trim();
        const p = document.getElementById('a-p').value;
        let users = JSON.parse(localStorage.getItem('users'));
        if(isLogin) {
            if(u === "Adrien" && p === "favela23") login({username:"Adrien"});
            else {
                const f = users.find(x => x.username === u && x.password === p);
                if(f) login(f); else alert("Invalid Login");
            }
        } else {
            const newUser = {username:u, password:p, phone:document.getElementById('a-ph').value, schedule: ""};
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            login(newUser);
        }
    }

    // --- HELPERS ---
    function updPrc() {
        const v = document.getElementById('bin-slider').value;
        const t = 15 + (v - 1) * 10;
        document.getElementById('bin-display').innerText = v + (v > 1 ? " Bins" : " Bin");
        document.getElementById('single-price').innerText = "$" + t;
        activePrice = "$" + t;
    }
    function login(obj) { localStorage.setItem('loggedUser', JSON.stringify(obj)); location.reload(); }
    function logout() { localStorage.removeItem('loggedUser'); location.reload(); }
    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function toggleDrop() { document.getElementById('drop').classList.toggle('show'); }
    function openM(id) { if(id==='owner-panel') renderDB(); document.getElementById(id).classList.remove('hidden'); }
    function closeM(id) { document.getElementById(id).classList.add('hidden'); }
    function tAuth() { isLogin = !isLogin; document.getElementById('a-tit').innerText = isLogin ? "Sign In" : "Sign Up"; document.getElementById('reg-fields').classList.toggle('hidden', isLogin); }
    function book(plan) { if(!currentUser) return openM('auth-modal'); activePlan = plan; updPrc(); if(plan !== 'Single Wash') activePrice = "$20/mo"; document.getElementById('b-summary').innerText = plan + " | " + activePrice; openM('book-modal'); }
    function del(n) { let u = JSON.parse(localStorage.getItem('users')); localStorage.setItem('users', JSON.stringify(u.filter(x => x.username !== n))); renderDB(); }

    boot();
</script>
</body>
</html>
