<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trouvaille Bins</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

nav{
display:flex;
gap:10px;
padding:12px;
background:#0f172a;
position:sticky;
top:0;
}

.section{
display:none;
padding:20px;
}

.active{display:block}

.card{
background:#0f172a;
padding:15px;
margin:10px 0;
border-radius:14px;
border:1px solid #1e293b;
}

/* ===== MODERN BUTTONS ===== */
.btn{
padding:12px 16px;
border-radius:14px;
border:none;
cursor:pointer;
font-weight:700;
transition:0.2s;
transform:translateY(0);
}

.btn:hover{transform:translateY(-2px)}
.btn:active{transform:scale(0.97)}

.btn-green{
background:linear-gradient(135deg,#10b981,#059669);
color:black;
box-shadow:0 10px 25px rgba(16,185,129,0.25);
}

.btn-blue{
background:linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
}

.btn-red{
background:linear-gradient(135deg,#ef4444,#dc2626);
color:white;
}

.btn-dark{
background:#1e293b;
color:white;
border:1px solid #334155;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid #334155;
background:#020617;
color:white;
}

h2{color:#10b981}
small{color:#94a3b8}
</style>
</head>

<body>

<nav>
<button class="btn btn-dark" onclick="show('login')">Login</button>
<button class="btn btn-dark" onclick="show('book')">Book</button>
<button class="btn btn-dark" onclick="show('dashboard')">Dashboard</button>
<button id="adminBtn" class="btn btn-blue" onclick="show('admin')" style="display:none">Admin</button>
</nav>

<!-- LOGIN -->
<div id="login" class="section active">
<h2>Login</h2>

<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">

<button class="btn btn-green" onclick="login()">Login</button>
<button class="btn btn-dark" onclick="signup()">Create Account</button>
</div>

<!-- BOOK -->
<div id="book" class="section">
<h2>Book Service</h2>

<select id="plan">
<option>One-Time</option>
<option>Monthly Plan</option>
</select>

<input id="bins" type="number" value="1">
<input id="name" placeholder="Full Name">
<input id="contact" placeholder="Contact">
<input id="address" placeholder="Address">

<button class="btn btn-green" onclick="book()">Book Now</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<h2>Your Schedule</h2>
<div id="userJobs"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
<h2>Admin Jobber Panel</h2>
<div id="jobs"></div>
</div>

<script>

emailjs.init("Or10zkajJK3CNcnic");

let users = JSON.parse(localStorage.getItem("users")||"[]");
let jobs = JSON.parse(localStorage.getItem("jobs")||"[]");
let session = JSON.parse(localStorage.getItem("session")||"null");

// NAV
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// LOGIN
function login(){
let u=document.getElementById("u").value;
let p=document.getElementById("p").value;

let found = users.find(x=>x.u===u && x.p===p);

if(!found && u==="Adrien" && p==="favela23"){
session={u:"Adrien",admin:true};
}else if(found){
session=found;
}else{
alert("Invalid login");
return;
}

localStorage.setItem("session",JSON.stringify(session));
setup();
}

// SIGNUP
function signup(){
let u=document.getElementById("u").value;
let p=document.getElementById("p").value;

users.push({u,p});
localStorage.setItem("users",JSON.stringify(users));
alert("Account created");
}

// BOOK
function book(){
if(!session) return alert("Login first");

let job={
id:Date.now(),
name:document.getElementById("name").value,
contact:document.getElementById("contact").value,
address:document.getElementById("address").value,
plan:document.getElementById("plan").value,
bins:document.getElementById("bins").value,
status:"pending",
start:null
};

jobs.push(job);
localStorage.setItem("jobs",JSON.stringify(jobs));

// EMAIL
emailjs.send("service_6ymb279","template_pruo22c",{
legal_name:job.name,
contact_information:job.contact,
user_name:session.u,
address:job.address,
plan:job.plan,
bin_amount:job.bins,
price:job.plan==="Monthly Plan"?"$45":"$15+",
eta_request:"New Booking"
});

alert("Booked!");
render();
}

// START CLEANING
function start(id){
let j=jobs.find(x=>x.id===id);
j.status="cleaning";
j.start=Date.now();
save();
render();
}

// FINISH
function finish(id){
jobs=jobs.filter(x=>x.id!==id);
save();
render();
}

function save(){
localStorage.setItem("jobs",JSON.stringify(jobs));
}

// TIMER
function timer(j){
if(!j.start) return "0m 0s";
let s=Math.floor((Date.now()-j.start)/1000);
return Math.floor(s/60)+"m "+(s%60)+"s";
}

// RENDER
function render(){

if(session?.admin){
document.getElementById("adminBtn").style.display="inline-block";
}

let admin=document.getElementById("jobs");
let user=document.getElementById("userJobs");

admin.innerHTML="";
user.innerHTML="";

jobs.forEach(j=>{

// ADMIN
admin.innerHTML+=`
<div class="card">
<b>${j.name}</b><br>
${j.address}<br>
${j.plan} | ${j.bins} bins<br>
Status: ${j.status}<br>
Timer: ${j.status==="cleaning"?timer(j):"-"}<br><br>

${j.status==="pending"
? `<button class="btn btn-blue" onclick="start(${j.id})">Start Cleaning</button>`
: `<button class="btn btn-red" onclick="finish(${j.id})">Finish</button>`}
</div>`;

// USER
if(session && j.name===session.u || session?.u==="Adrien"){
user.innerHTML+=`
<div class="card">
${j.plan} - ${j.status}<br>
${j.address}
</div>`;
}
});
}

function setup(){
if(session?.admin){
document.getElementById("adminBtn").style.display="inline-block";
}
render();
}

setup();
</script>

</body>
</html>
