<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Bins | Service</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
            color: white; 
            margin: 0;
        }

        .glass { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(20px); 
            border: 1px solid #1e293b; 
        }

        .btn { 
            transition: 0.2s; 
            cursor: pointer; 
            user-select: none; 
        }
        .btn:active { transform: scale(0.95); }

        .owner-only { display: none !important; }
        body.is-owner .owner-only { display: block !important; }

        input, textarea {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 15px;
            color: white;
            outline: none;
            width: 100%;
        }

        input[type="datetime-local"] { color-scheme: dark; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="pb-20">

    <div id="top-banner" class="hidden bg-emerald-600 text-white py-3 text-center sticky top-0 z-[10000] font-bold text-xs uppercase tracking-widest">
        <span id="banner-text">Welcome!</span>
    </div>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <h1 class="text-2xl font-extrabold italic uppercase">Clean <span class="text-emerald-500">Bins</span></h1>
        
        <div class="relative">
            <button onclick="toggleMenu()" class="btn glass px-5 py-2 rounded-full border-slate-700 flex items-center gap-3">
                <p id="u-name" class="text-[10px] font-bold uppercase">Guest</p>
                <i class="fa-solid fa-circle-user text-xl text-emerald-500"></i>
            </button>
            
            <div id="u-menu" class="hidden absolute right-0 mt-4 w-64 glass p-4 rounded-3xl shadow-2xl z-[11000]">
                <div id="logged-in-ui" class="hidden space-y-2">
                    <button onclick="openModal('founder-panel')" class="owner-only w-full p-4 bg-emerald-500/10 rounded-xl text-emerald-500 text-xs font-bold uppercase">Owner Menu</button>
                    <button onclick="openModal('eta-modal')" class="w-full p-4 hover:bg-slate-800 rounded-xl text-xs font-bold uppercase">My Time</button>
                    <button onclick="logout()" class="w-full p-4 text-red-500 text-xs font-bold uppercase">Sign Out</button>
                </div>
                <div id="logged-out-ui">
                    <button onclick="openModal('auth-modal')" class="w-full bg-emerald-500 py-4 rounded-xl text-white text-xs font-bold uppercase">Sign In</button>
                </div>
            </div>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto px-6 py-20 text-center">
        <h2 class="text-7xl font-black uppercase italic mb-6 leading-none">Clean <br><span class="text-emerald-500">Bins.</span></h2>
        <p class="text-slate-400 mb-10 font-medium">Get your trash bins cleaned and smelling fresh. Simple pricing, fast service.</p>
        
        <div class="flex flex-col sm:flex-row justify-center gap-4">
            <a href="#plans" class="btn bg-emerald-500 text-white px-10 py-5 rounded-2xl font-bold uppercase text-xs">See Prices</a>
            <button id="hero-signin" onclick="openModal('auth-modal')" class="btn glass text-white px-10 py-5 rounded-2xl font-bold uppercase text-xs">Sign In</button>
        </div>
    </header>

    <section id="plans" class="max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-8 py-10">
        <div class="glass p-10 rounded-[3rem] border-slate-800">
            <h4 class="text-2xl font-black italic mb-6 uppercase tracking-tight text-emerald-500">One-Time Clean</h4>
            <div class="flex justify-between items-end mb-8">
                <span id="bin-label" class="text-4xl font-black">1 Bin</span>
                <span id="price-label" class="text-4xl font-black">$15</span>
            </div>
            <input type="range" id="bin-slider" min="1" max="10" value="1" oninput="updateUI()" class="w-full h-2 bg-slate-800 rounded-lg accent-emerald-500 mb-10">
            <button onclick="book('One-Time')" class="btn w-full bg-white text-black py-6 rounded-2xl font-bold uppercase text-xs">Request Clean</button>
        </div>

        <div class="glass p-10 rounded-[3rem] border-emerald-500/30">
            <h4 class="text-2xl font-black italic mb-6 uppercase tracking-tight text-emerald-400">Monthly Plan</h4>
            <div class="mb-10">
                <span class="text-7xl font-black">$45</span>
                <span class="text-slate-500 font-bold uppercase text-sm">/ Month</span>
            </div>
            <button onclick="book('Monthly Plan')" class="btn w-full bg-emerald-500 text-white py-6 rounded-2xl font-bold uppercase text-xs">Sign Up Monthly</button>
        </div>
    </section>

    <div id="founder-panel" class="hidden fixed inset-0 bg-slate-950/98 z-[11000] p-4 flex items-center justify-center">
        <div class="glass w-full max-w-5xl h-[85vh] rounded-[3rem] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <div class="flex gap-4">
                    <button onclick="showTab('tab-users')" class="text-xs font-bold uppercase text-emerald-500">Users</button>
                    <button onclick="showTab('tab-msg')" class="text-xs font-bold uppercase text-slate-500 ml-4">Banner</button>
                </div>
                <button onclick="closeModal('founder-panel')"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-8">
                <div id="tab-users" class="tab-content active space-y-4">
                    </div>
                <div id="tab-msg" class="tab-content">
                    <h3 class="text-xs font-bold uppercase mb-4 text-slate-500">Global Message</h3>
                    <textarea id="msg-input" class="mb-4" placeholder="Type here..."></textarea>
                    <div class="flex gap-2">
                        <button onclick="setMsg()" class="btn bg-emerald-500 px-6 py-4 rounded-xl text-xs font-bold uppercase">Post</button>
                        <button onclick="clearMsg()" class="btn bg-red-600 px-6 py-4 rounded-xl text-xs font-bold uppercase">Remove</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 bg-slate-950/98 z-[12000] flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-10 rounded-[3rem] text-center">
            <h3 id="auth-title" class="text-3xl font-black uppercase italic mb-8">Sign In</h3>
            
            <div id="reg-fields" class="hidden space-y-3 mb-3">
                <input id="in-name" type="text" placeholder="Your Full Name">
                <input id="in-phone" type="tel" placeholder="Your Phone Number">
            </div>
            
            <input id="in-user" type="text" placeholder="Username" class="mb-3">
            <input id="in-pass" type="password" placeholder="Passcode" class="mb-6">
            
            <button onclick="handleAuth()" class="btn w-full bg-emerald-500 py-5 rounded-2xl font-bold text-xs uppercase">Continue</button>
            <p onclick="toggleAuth()" id="auth-toggle" class="mt-6 text-[10px] font-bold text-slate-500 uppercase cursor-pointer">Don't have an account? Sign Up</p>
            <button onclick="closeModal('auth-modal')" class="mt-4 text-slate-600 text-[10px] font-bold uppercase">Cancel</button>
        </div>
    </div>

    <div id="eta-modal" class="hidden fixed inset-0 bg-slate-950/98 z-[12000] flex items-center justify-center p-6">
        <div class="glass p-10 rounded-[3rem] text-center w-full max-w-xs">
            <h3 class="text-xs font-bold uppercase text-slate-500 mb-6">Your Cleaning Time</h3>
            <div class="py-8 bg-slate-900 rounded-3xl border border-slate-800">
                <p id="eta-txt" class="text-2xl font-black text-emerald-400">Awaiting...</p>
            </div>
            <button onclick="closeModal('eta-modal')" class="mt-8 text-xs font-bold uppercase text-slate-500">Close</button>
        </div>
    </div>

    <script>
        const CFG = { s: "service_6ymb279", t: "template_pruo22c", k: "Or10zkajJK3CNcnic", a: "favela23@gmail.com" };
        emailjs.init(CFG.k);

        let users = JSON.parse(localStorage.getItem('users')) || [];
        let session = JSON.parse(localStorage.getItem('session')) || null;
        let isSigningUp = false;

        function init() {
            if (session) {
                document.getElementById('u-name').innerText = session.username;
                document.getElementById('logged-out-ui').classList.add('hidden');
                document.getElementById('logged-in-ui').classList.remove('hidden');
                document.getElementById('hero-signin').classList.add('hidden');
                
                if (session.username === "Adrien") document.body.classList.add('is-owner');
                
                const profile = users.find(u => u.username === session.username) || session;
                document.getElementById('eta-txt').innerText = profile.eta || "Not Scheduled Yet";
            }

            const msg = localStorage.getItem('site_msg');
            if (msg) {
                document.getElementById('top-banner').classList.remove('hidden');
                document.getElementById('banner-text').innerText = msg;
            }
            updateUI();
            drawUsers();
        }

        function updateUI() {
            const val = document.getElementById('bin-slider').value;
            document.getElementById('bin-label').innerText = val + (val > 1 ? " Bins" : " Bin");
            document.getElementById('price-label').innerText = "$" + (15 + (val - 1) * 10);
        }

        function toggleAuth() {
            isSigningUp = !isSigningUp;
            document.getElementById('auth-title').innerText = isSigningUp ? "Sign Up" : "Sign In";
            document.getElementById('reg-fields').classList.toggle('hidden', !isSigningUp);
            document.getElementById('auth-toggle').innerText = isSigningUp ? "Already have an account? Sign In" : "Don't have an account? Sign Up";
        }

        function handleAuth() {
            const u = document.getElementById('in-user').value.trim();
            const p = document.getElementById('in-pass').value.trim();

            if (!isSigningUp) {
                if (u === "Adrien" && p === "favela23") return login({username: "Adrien", name: "Owner"});
                const user = users.find(x => x.username === u && x.password === p);
                if (user) login(user); else alert("Wrong login info.");
            } else {
                const n = document.getElementById('in-name').value.trim();
                const ph = document.getElementById('in-phone').value.trim();
                if (!u || !p || !n) return alert("Please fill in all boxes.");
                const newUser = { username: u, password: p, name: n, phone: ph, plan: "One-Time", eta: "" };
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                login(newUser);
            }
        }

        async function book(tier) {
            if (!session) return openModal('auth-modal');
            const addr = prompt("What is your address?");
            if (!addr) return;

            const profile = users.find(u => u.username === session.username) || session;
            const price = tier === "Monthly Plan" ? "$45" : document.getElementById('price-label').innerText;

            try {
                await emailjs.send(CFG.s, CFG.t, {
                    to_email: CFG.a,
                    legal_name: profile.name,
                    user_phone: profile.phone,
                    user_name: session.username,
                    address: addr,
                    plan: tier,
                    price: price,
                    bins: document.getElementById('bin-slider').value
                });
                alert("Request sent! Adrien will contact you soon.");
            } catch (e) { alert("Error sending request."); }
        }

        // OWNER FUNCTIONS
        function setMsg() {
            localStorage.setItem('site_msg', document.getElementById('msg-input').value);
            location.reload();
        }
        function clearMsg() {
            localStorage.removeItem('site_msg');
            location.reload();
        }

        function drawUsers() {
            const list = document.getElementById('tab-users');
            if (!list) return;
            list.innerHTML = users.map(u => `
                <div class="glass p-6 rounded-3xl flex justify-between items-center">
                    <div>
                        <p class="font-bold text-sm uppercase">${u.username}</p>
                        <p class="text-[10px] text-emerald-500 font-bold uppercase">${u.name} • ${u.phone}</p>
                    </div>
                    <div class="flex gap-2">
                        <input type="datetime-local" id="time-${u.username}" class="w-32 py-1 px-2 text-[10px]">
                        <button onclick="setETA('${u.username}')" class="bg-emerald-500 p-3 rounded-xl"><i class="fa-solid fa-check"></i></button>
                        <button onclick="removeUser('${u.username}')" class="bg-red-500/20 text-red-500 p-3 rounded-xl"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function setETA(un) {
            const val = document.getElementById(`time-${un}`).value;
            if (!val) return;
            const d = new Date(val);
            const timeStr = d.toLocaleDateString() + " @ " + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const i = users.findIndex(u => u.username === un);
            users[i].eta = timeStr;
            localStorage.setItem('users', JSON.stringify(users));
            alert("Time set for " + un);
            drawUsers();
        }

        function removeUser(un) {
            if (confirm("Delete " + un + "?")) {
                users = users.filter(u => u.username !== un);
                localStorage.setItem('users', JSON.stringify(users));
                drawUsers();
            }
        }

        function login(o) { localStorage.setItem('session', JSON.stringify(o)); location.reload(); }
        function logout() { localStorage.removeItem('session'); location.reload(); }
        function toggleMenu() { document.getElementById('u-menu').classList.toggle('hidden'); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        init();
    </script>
</body>
</html>
