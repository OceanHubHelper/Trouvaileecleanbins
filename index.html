<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trouvaille Bins</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        * { font-family: 'Inter', sans-serif; transition: 0.2s; scroll-behavior: smooth; }
        .hero-grad { background: radial-gradient(circle at top right, #064e3b, #020617); }
        .dropdown { display: none; position: absolute; right: 0; top: 110%; width: 14rem; background: #1e293b; border-radius: 1rem; border: 1px solid #334155; z-index: 100; }
        .show { display: block !important; }
        .owner-only { display: none !important; }
        body.is-owner .owner-only { display: block !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-100">

<nav class="border-b border-slate-800 bg-[#020617]/90 backdrop-blur-md p-4 sticky top-0 z-[100]">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <h1 class="text-xl font-black italic uppercase tracking-tighter">Trouvaille Bins</h1>
        
        <div class="relative">
            <button onclick="toggleDrop()" class="flex items-center gap-3 bg-slate-900 border border-slate-700 p-2 px-4 rounded-full hover:border-emerald-500">
                <span id="nav-name" class="text-[10px] font-bold uppercase text-slate-400">Guest</span>
                <div id="nav-av" class="w-7 h-7 rounded-full bg-emerald-500 text-white flex items-center justify-center text-xs font-bold">?</div>
            </button>
            <div id="drop" class="dropdown overflow-hidden shadow-2xl">
                <button onclick="openM('owner-panel')" class="owner-only w-full text-left p-4 hover:bg-emerald-500/10 text-[10px] font-black text-emerald-400 border-b border-slate-700">FOUNDER PANEL</button>
                <button id="p-btn" onclick="openM('profile-modal')" class="hidden w-full text-left p-4 hover:bg-slate-700 text-[10px] font-bold text-slate-300 border-b border-slate-700">MY PROFILE</button>
                <button id="lo-btn" onclick="logout()" class="hidden w-full text-left p-4 hover:bg-red-500/10 text-[10px] font-bold text-red-400">SIGN OUT</button>
                <button id="li-btn" onclick="openM('auth-modal')" class="w-full text-left p-4 hover:bg-emerald-500/10 text-[10px] font-bold text-emerald-400">SIGN IN</button>
            </div>
        </div>
    </div>
</nav>

<section class="hero-grad pt-24 pb-32 px-6 text-center">
    <div class="max-w-3xl mx-auto">
        <h2 class="text-5xl md:text-7xl font-black text-white italic mb-6 uppercase leading-tight">Elite Bin Hygiene.</h2>
        <p class="text-slate-400 text-lg mb-10">High-pressure steam cleaning and deodorization for your home.</p>
        <button onclick="document.getElementById('plans').scrollIntoView()" class="bg-emerald-500 hover:bg-emerald-400 text-white px-10 py-4 rounded-2xl font-black shadow-lg uppercase text-sm">View Services</button>
    </div>
</section>

<section id="plans" class="max-w-5xl mx-auto px-6 -mt-16 grid md:grid-cols-2 gap-8 pb-32">
    <div class="bg-slate-900 border border-slate-800 p-10 rounded-[2rem] shadow-xl">
        <h3 class="text-emerald-500 font-black text-xs uppercase tracking-widest mb-2">Single Wash</h3>
        <p class="text-4xl font-black text-white mb-6">$15 <span class="text-sm font-normal text-slate-500">/ One-time</span></p>
        <button onclick="book('Single Wash')" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-black uppercase text-xs">Book Single</button>
    </div>
    <div class="bg-emerald-600 p-10 rounded-[2rem] shadow-2xl">
        <h3 class="text-emerald-200 font-black text-xs uppercase tracking-widest mb-2">Elite Subscription</h3>
        <p class="text-4xl font-black text-white mb-6">$20 <span class="text-sm font-normal text-emerald-200">/ Month</span></p>
        <button onclick="book('Monthly Elite')" class="w-full py-4 bg-white text-emerald-600 hover:bg-emerald-50 rounded-xl font-black uppercase text-xs">Subscribe Now</button>
    </div>
</section>

<div id="book-modal" class="hidden fixed inset-0 bg-black/90 z-[500] flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2rem] w-full max-w-sm relative">
        <h2 class="text-2xl font-black text-white italic mb-2 uppercase">Confirm Order</h2>
        <p id="b-plan" class="text-emerald-500 font-bold text-xs uppercase mb-6"></p>
        <input id="b-addr" placeholder="Your Address" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none mb-4">
        <button id="b-sub" onclick="handleOrder()" class="w-full bg-emerald-500 text-white py-4 rounded-xl font-black uppercase text-sm">Send Request</button>
        <button onclick="closeM('book-modal')" class="absolute top-6 right-6 text-slate-500 text-xl">×</button>
    </div>
</div>

<div id="profile-modal" class="hidden fixed inset-0 bg-black/90 z-[500] flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2rem] w-full max-w-sm text-center relative">
        <div id="prof-av" class="w-20 h-20 bg-emerald-500 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-black"></div>
        <h2 id="prof-name" class="text-2xl font-black uppercase italic mb-1"></h2>
        <p id="prof-email" class="text-slate-500 text-sm mb-8 font-bold"></p>
        <button onclick="closeM('profile-modal')" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold text-xs">CLOSE</button>
    </div>
</div>

<div id="owner-panel" class="hidden fixed inset-0 bg-black/95 z-[500] flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-slate-800 rounded-[2rem] w-full max-w-4xl h-[70vh] flex flex-col overflow-hidden relative">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <h2 class="text-sm font-black uppercase text-emerald-500 italic">User Database</h2>
            <button onclick="closeM('owner-panel')" class="text-slate-500 hover:text-white text-2xl">×</button>
        </div>
        <div class="flex-1 overflow-y-auto p-6">
            <table class="w-full text-left text-xs">
                <thead class="uppercase text-slate-500 font-black border-b border-slate-800">
                    <tr><th class="pb-4">Name</th><th class="pb-4">Email</th><th class="pb-4">Plan</th><th class="pb-4 text-right">Control</th></tr>
                </thead>
                <tbody id="db-list"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="auth-modal" class="hidden fixed inset-0 bg-black/90 z-[500] flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2rem] w-full max-w-sm relative">
        <h2 id="a-tit" class="text-2xl font-black uppercase italic mb-6">Access</h2>
        <div class="space-y-3">
            <input id="a-u" placeholder="Username" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none">
            <input id="a-e" placeholder="Email" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none hidden">
            <input id="a-p" type="password" placeholder="Passcode" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none">
            <button onclick="auth()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-black uppercase text-sm">Continue</button>
            <button onclick="tAuth()" id="a-tgl" class="w-full text-slate-500 text-[10px] font-black uppercase mt-4 hover:text-white">Create Account</button>
        </div>
        <button onclick="closeM('auth-modal')" class="absolute top-6 right-6 text-slate-500 text-xl">×</button>
    </div>
</div>

<script>
    const KEY_PUB = "Service_6ymb279"; 
    const KEY_SER = "v-4sLf-EzCLBYcWe7";
    const T_OWN = "template_pruo22c";
    const T_CUS = "template_4hi1opb";

    let user = JSON.parse(localStorage.getItem('loggedUser')) || null;
    let isLog = true;
    let selectedPlan = "";

    function boot() {
        emailjs.init(KEY_PUB);
        // Safety check to ensure users array always exists
        if(!localStorage.getItem('users')) localStorage.setItem('users', JSON.stringify([]));

        if(user) {
            document.getElementById('nav-name').innerText = user.username;
            document.getElementById('nav-av').innerText = user.username[0].toUpperCase();
            document.getElementById('li-btn').classList.add('hidden');
            document.getElementById('lo-btn').classList.remove('hidden');
            document.getElementById('p-btn').classList.remove('hidden');
            if(user.username === "Adrien") document.body.classList.add('is-owner');
        }
    }

    async function handleOrder() {
        const addr = document.getElementById('b-addr').value;
        const btn = document.getElementById('b-sub');
        if(!addr) return alert("Address required.");

        btn.innerText = "SENDING...";
        btn.disabled = true;

        const data = {
            user_name: user.username,
            user_email: user.email,
            plan_selected: selectedPlan,
            address: addr,
            to_email: "favela23@gmail.com"
        };

        try {
            await emailjs.send(KEY_SER, T_OWN, data);
            await emailjs.send(KEY_SER, T_CUS, data);
            alert("Order Sent!");
            location.reload();
        } catch (e) {
            alert("Email error. Check your IDs.");
            btn.innerText = "TRY AGAIN";
            btn.disabled = false;
        }
    }

    function render() {
        const users = JSON.parse(localStorage.getItem('users')) || [];
        const list = document.getElementById('db-list');
        list.innerHTML = users.length ? users.map(u => `
            <tr class="border-b border-slate-800">
                <td class="py-4 font-bold uppercase text-white">${u.username}</td>
                <td class="py-4 text-slate-500 font-medium">${u.email}</td>
                <td class="py-4">
                    <select onchange="updPlan('${u.username}', this.value)" class="bg-slate-800 text-emerald-400 font-black text-[10px] uppercase p-2 rounded border border-slate-700 outline-none">
                        <option value="None" ${u.plan==='None'?'selected':''}>None</option>
                        <option value="Single Wash" ${u.plan==='Single Wash'?'selected':''}>Single</option>
                        <option value="Monthly Elite" ${u.plan==='Monthly Elite'?'selected':''}>Monthly</option>
                    </select>
                </td>
                <td class="py-4 text-right"><button onclick="del('${u.username}')" class="text-red-500 bg-red-500/10 px-3 py-1 rounded font-black hover:text-white">WIPE</button></td>
            </tr>`).join('') : '<tr><td colspan="4" class="py-10 text-center text-slate-700 font-black">NO ACCOUNTS FOUND</td></tr>';
    }

    function updPlan(n, p) {
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let i = users.findIndex(x => x.username === n);
        if(i !== -1) { users[i].plan = p; localStorage.setItem('users', JSON.stringify(users)); }
    }

    function del(n) {
        if(!confirm("Wipe account?")) return;
        let users = JSON.parse(localStorage.getItem('users')) || [];
        localStorage.setItem('users', JSON.stringify(users.filter(x => x.username !== n)));
        render();
    }

    function auth() {
        const u = document.getElementById('a-u').value.trim();
        const p = document.getElementById('a-p').value.trim();
        const e = document.getElementById('a-e').value.trim();
        let users = JSON.parse(localStorage.getItem('users')) || [];

        if(isLog) {
            if(u === "Adrien" && p === "favela23") {
                login({username: u, email: "founder@trouvaille.com"});
            } else {
                const found = users.find(x => x.username === u && x.password === p);
                if(found) login(found); else alert("Invalid Credentials");
            }
        } else {
            if(!u || !p || !e) return alert("Fill all fields");
            if(users.find(x => x.username === u)) return alert("Username taken");
            
            const newUser = {username: u, password: p, email: e, plan: "None"};
            users.push(newUser); // Push specifically to array
            localStorage.setItem('users', JSON.stringify(users)); // Save immediately
            login(newUser);
        }
    }

    function login(o) { localStorage.setItem('loggedUser', JSON.stringify(o)); location.reload(); }
    function logout() { localStorage.removeItem('loggedUser'); location.reload(); }
    function tAuth() { isLog = !isLog; document.getElementById('a-tit').innerText = isLog ? "Access" : "Register"; document.getElementById('a-e').classList.toggle('hidden', isLog); }
    function openM(id) { 
        if(id === 'owner-panel') render();
        if(id === 'profile-modal' && user) {
            document.getElementById('prof-name').innerText = user.username;
            document.getElementById('prof-email').innerText = user.email || "No Email";
            document.getElementById('prof-av').innerText = user.username[0].toUpperCase();
        }
        document.getElementById(id).classList.remove('hidden'); 
    }
    function closeM(id) { document.getElementById(id).classList.add('hidden'); }
    function toggleDrop() { document.getElementById('drop').classList.toggle('show'); }
    function book(plan) { 
        if(!user) return openM('auth-modal'); 
        selectedPlan = plan; 
        document.getElementById('b-plan').innerText = plan; 
        openM('book-modal'); 
    }

    boot();
</script>
</body>
</html>
