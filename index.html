<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trouvaille Bins System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#020617; color:white; }
.glass { background:#0f172a; border:1px solid #1e293b; border-radius:16px; padding:16px; }
.btn { padding:12px; border-radius:10px; font-weight:bold; cursor:pointer; }
input, select { width:100%; padding:10px; margin:5px 0; color:black; border-radius:8px; }
.hidden{display:none;}
</style>
</head>

<body>

<script>
/* ================= EMAILJS ================= */
const EMAIL = {
  serviceID: "service_6ymb279",
  templateID: "template_pruo22c",
  publicKey: "Or10zkajJK3CNcnic"
};
emailjs.init(EMAIL.publicKey);

/* ================= DATA ================= */
let users = JSON.parse(localStorage.getItem("users")) || [];
let session = JSON.parse(localStorage.getItem("session")) || null;

function save(){
  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("session", JSON.stringify(session));
}

function logout(){
  localStorage.removeItem("session");
  location.reload();
}
</script>

<!-- NAV -->
<div class="glass m-4 flex justify-between">
<h2>Trouvaille Bins</h2>
<div>
<button class="btn bg-emerald-500" onclick="openLogin()">Login</button>
<button class="btn bg-red-500" onclick="logout()">Logout</button>
</div>
</div>

<!-- MAIN -->
<div class="text-center p-6">

<h1 class="text-2xl font-bold">Book Cleaning Service</h1>

<button class="btn bg-emerald-500 m-2" onclick="book('One-Time')">
One-Time ($15)
</button>

<button class="btn bg-blue-500 m-2" onclick="book('Monthly Plan')">
Monthly ($45)
</button>

</div>

<!-- USER INFO -->
<div class="glass m-4">
<h3>User Panel</h3>

<div id="userPanel">Not logged in</div>

<h4 class="mt-3">Your Schedule</h4>
<select id="scheduleBox"></select>
</div>

<!-- ADMIN PANEL -->
<div id="admin" class="glass m-4 hidden">
<h2>Founder Hub</h2>

<div id="userList"></div>
</div>

<!-- LOGIN -->
<div id="login" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
<div class="glass w-80">

<h3>Login</h3>

<input id="u" placeholder="username"/>
<input id="p" placeholder="password" type="password"/>

<button class="btn bg-emerald-500 w-full" onclick="login()">Enter</button>
<button class="btn bg-red-500 w-full mt-2" onclick="closeLogin()">Close</button>

</div>
</div>

<script>
function openLogin(){document.getElementById("login").classList.remove("hidden")}
function closeLogin(){document.getElementById("login").classList.add("hidden")}

/* ================= LOGIN ================= */
function login(){
let u=document.getElementById("u").value;
let p=document.getElementById("p").value;

if(u==="Adrien" && p==="favela23"){
session={username:"Adrien",role:"Owner",name:"Founder",contact_information:"Admin"};
save(); location.reload(); return;
}

let found=users.find(x=>x.username===u && x.password===p);
if(!found) return alert("wrong login");

session={...found,role:"User"};
save(); location.reload();
}

/* ================= BOOKING ================= */
async function book(plan){
if(!session) return alert("login first");

let addr=prompt("address?");
if(!addr) return;

let price=plan==="Monthly Plan"?"$45":"$15";
let bins=plan==="Monthly Plan"?"6":"1";

await emailjs.send(
EMAIL.serviceID,
EMAIL.templateID,
{
legal_name:session.name,
contact_information:session.contact_information,
user_name:session.username,
address:addr,
plan:plan,
bin_amount:bins,
price:price,
eta_request:new Date().toString()
}
);

alert("Booked!");
}

/* ================= UI ================= */
function render(){

if(!session){
document.getElementById("userPanel").innerText="Guest";
return;
}

document.getElementById("userPanel").innerHTML=
`<b>${session.username}</b><br>Plan: ${session.plan||"None"}`;

if(session.role==="Owner"){
document.getElementById("admin").classList.remove("hidden");
renderAdmin();
}
renderSchedule();
}

/* ================= SCHEDULE ================= */
function renderSchedule(){
let box=document.getElementById("scheduleBox");
box.innerHTML="";

if(!session || !session.dates) return;

session.dates.forEach(d=>{
let opt=document.createElement("option");
opt.innerText=new Date(d).toLocaleString();
box.appendChild(opt);
});
}

/* ================= ADMIN ================= */
function renderAdmin(){
let list=document.getElementById("userList");
list.innerHTML="";

users.forEach(u=>{
list.innerHTML+=`
<div class="glass m-2">
<b>${u.username}</b><br>
${u.name}<br>

<button onclick="upgrade('${u.username}')">Upgrade</button>
<button onclick="del('${u.username}')">Delete</button>
<br><br>

<input type="datetime-local" id="d_${u.username}">
<button onclick="addDate('${u.username}')">Add Schedule</button>
</div>`;
});
}

function upgrade(u){
let i=users.find(x=>x.username===u);
i.plan="Monthly Plan";
save(); location.reload();
}

function del(u){
users=users.filter(x=>x.username!==u);
save(); location.reload();
}

function addDate(u){
let val=document.getElementById("d_"+u).value;
if(!val) return;

let i=users.find(x=>x.username===u);
if(!i.dates) i.dates=[];
i.dates.push(val);

save(); location.reload();
}

render();
</script>

</body>
</html>
