<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trouvaille Bins | Professional Cleaning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        :root { --bg: #020617; --card: #0f172a; --border: #1e293b; --emerald: #10b981; }
        * { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg); color: #f8fafc; margin: 0; }
        .glass-card { background: var(--card); border: 1px solid var(--border); }
        .owner-only { display: none !important; }
        body.is-owner .owner-only { display: block !important; }
        .dropdown { display: none; position: absolute; right: 0; top: 115%; width: 14rem; background: var(--card); border: 1px solid var(--border); border-radius: 1.5rem; z-index: 100; padding: 0.5rem; box-shadow: 0 20px 25px rgba(0,0,0,0.5); }
        .show { display: block !important; }
        .tab-btn.active { border-bottom: 2px solid var(--emerald); color: var(--emerald); }
        input[type=range] { -webkit-appearance: none; background: #334155; height: 8px; border-radius: 10px; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: var(--emerald); cursor: pointer; border: 3px solid white; }
    </style>
</head>
<body>

<div id="global-announcement" class="hidden bg-emerald-500 text-white py-2 px-4 text-center text-[10px] font-black uppercase tracking-widest relative">
    <span id="announcement-text"></span>
    <button onclick="closeAnnouncement()" class="absolute right-4 top-1/2 -translate-y-1/2 opacity-50">&times;</button>
</div>

<nav class="p-4 border-b border-slate-800 flex justify-between items-center sticky top-0 bg-slate-950/90 backdrop-blur-md z-50">
    <h1 class="font-black italic uppercase tracking-tighter text-xl">Trouvaille <span class="text-emerald-500">Bins</span></h1>
    <div class="relative">
        <button onclick="document.getElementById('drop').classList.toggle('show')" class="glass-card pl-4 pr-2 py-2 rounded-full flex items-center gap-3">
            <span id="nav-name" class="text-[10px] font-bold uppercase opacity-60">Guest</span>
            <img id="nav-avatar" src="https://ui-avatars.com/api/?name=?&background=10b981&color=fff" class="w-8 h-8 rounded-full border border-slate-700">
        </button>
        <div id="drop" class="dropdown">
            <button onclick="openM('owner-panel')" class="owner-only w-full text-left p-3 hover:bg-emerald-500/10 text-[10px] font-black text-emerald-500 border-b border-slate-800/20 uppercase">Founder Panel</button>
            <button onclick="openM('profile-modal')" class="w-full text-left p-3 hover:bg-slate-800 text-[10px] font-bold uppercase rounded-lg">Profile</button>
            <button onclick="openM('view-schedule-modal')" class="w-full text-left p-3 hover:bg-slate-800 text-[10px] font-bold uppercase rounded-lg">My Schedule</button>
            <button onclick="logout()" class="w-full text-left p-3 hover:bg-red-500/10 text-[10px] font-bold text-red-500 uppercase rounded-lg">Sign Out</button>
        </div>
    </div>
</nav>

<main class="py-12 px-6 text-center max-w-5xl mx-auto">
    <div class="grid md:grid-cols-2 gap-8">
        <div class="glass-card p-8 rounded-[3rem] text-left">
            <h4 class="text-xl font-black italic uppercase">Single Wash</h4>
            <div class="my-8">
                <div class="flex justify-between items-end mb-4">
                    <span id="bin-display" class="text-3xl font-black">1 Bin</span>
                    <span id="single-price" class="text-3xl font-black text-emerald-500">$15</span>
                </div>
                <input type="range" id="bin-slider" min="1" max="5" value="1" oninput="updatePricing()">
            </div>
            <button onclick="initiateOrder('Single Wash')" class="w-full bg-emerald-500 py-5 rounded-2xl font-black uppercase text-xs">Book Service</button>
        </div>

        <div class="bg-emerald-600 p-8 rounded-[3rem] text-left shadow-2xl relative">
            <h4 class="text-xl font-black italic uppercase text-white">Monthly</h4>
            <p class="text-5xl font-black text-white my-10 tracking-tighter">$20<span class="text-sm font-normal opacity-60">/mo</span></p>
            <button onclick="initiateOrder('Monthly Subscription')" class="w-full bg-white text-emerald-600 py-5 rounded-2xl font-black uppercase text-xs">Subscribe</button>
        </div>
    </div>
</main>

<div id="view-schedule-modal" class="hidden fixed inset-0 bg-black/95 z-[200] p-4 flex items-center justify-center">
    <div class="glass-card w-full max-w-sm p-8 rounded-[3rem] text-center">
        <h2 class="text-xl font-black uppercase italic mb-4">Your Schedule</h2>
        <div id="user-schedule-box" class="bg-slate-900 p-6 rounded-2xl border border-emerald-500/30">
            <p class="opacity-40 text-[10px] uppercase font-bold mb-2">Next Cleaning</p>
            <p id="user-schedule-text" class="text-xl font-black text-emerald-400">No Booking Found</p>
        </div>
        <button onclick="closeM('view-schedule-modal')" class="mt-6 uppercase text-[10px] font-black opacity-30">Close</button>
    </div>
</div>

<div id="owner-panel" class="hidden fixed inset-0 bg-slate-950 z-[500] flex items-center justify-center p-4">
    <div class="glass-card w-full max-w-5xl h-[85vh] rounded-[2.5rem] flex flex-col overflow-hidden animate-pop">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
            <div class="flex gap-6">
                <button onclick="switchTab('tab-users')" id="btn-users" class="tab-btn active text-[10px] font-black uppercase tracking-widest pb-2">Users</button>
                <button onclick="switchTab('tab-ann')" id="btn-ann" class="tab-btn text-[10px] font-black uppercase tracking-widest pb-2">Announcements</button>
                <button onclick="switchTab('tab-sch')" id="btn-sch" class="tab-btn text-[10px] font-black uppercase tracking-widest pb-2">Scheduling</button>
            </div>
            <button onclick="closeM('owner-panel')" class="text-2xl opacity-50">&times;</button>
        </div>

        <div id="tab-users" class="tab-content flex-1 overflow-auto p-8">
            <table class="w-full text-left text-xs">
                <thead class="opacity-30 uppercase font-black border-b border-slate-800">
                    <tr><th class="pb-4">Username</th><th class="pb-4">Plan</th><th class="pb-4">Contact</th><th class="pb-4 text-right">Actions</th></tr>
                </thead>
                <tbody id="user-list-body"></tbody>
            </table>
        </div>

        <div id="tab-ann" class="tab-content hidden flex-1 p-8">
            <h3 class="font-black uppercase italic mb-4">Post Global Message</h3>
            <textarea id="ann-input" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none h-32 mb-4" placeholder="Type what you want everyone to see..."></textarea>
            <div class="flex gap-4">
                <button onclick="postAnnouncement()" class="bg-emerald-500 px-8 py-3 rounded-xl font-black uppercase text-[10px]">Make Public</button>
                <button onclick="deleteAnnouncement()" class="bg-red-500/20 text-red-500 px-8 py-3 rounded-xl font-black uppercase text-[10px]">Clear Banner</button>
            </div>
        </div>

        <div id="tab-sch" class="tab-content hidden flex-1 p-8">
            <div class="mb-6">
                <input type="text" id="sch-search" oninput="filterSchUsers()" placeholder="Search username..." class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none focus:border-emerald-500">
            </div>
            <div id="sch-user-list" class="space-y-2 overflow-auto max-h-[50vh]"></div>
        </div>
    </div>
</div>

<script>
    // --- CONFIG ---
    const E_PUB = "Or10zkajJK3CNcnic"; 
    const E_SER = "service_6ymb279"; 
    const T_OWN = "template_pruo22c"; 
    const ADMIN = "favela23@gmail.com"; 

    emailjs.init(E_PUB);

    let current = JSON.parse(localStorage.getItem('loggedUser')) || null;
    let selectedPlan = ""; 
    let currentPrice = "$15";
    let currentBins = "1";

    // --- INITIALIZATION ---
    function boot() {
        if(!localStorage.getItem('users')) localStorage.setItem('users', JSON.stringify([]));
        
        // Load Announcement
        const savedAnn = localStorage.getItem('globalAnn');
        if(savedAnn) {
            document.getElementById('global-announcement').classList.remove('hidden');
            document.getElementById('announcement-text').innerText = savedAnn;
        }

        if(current) {
            document.getElementById('nav-name').innerText = current.username;
            document.getElementById('nav-avatar').src = `https://ui-avatars.com/api/?name=${current.username.charAt(0)}&background=10b981&color=fff&bold=true`;
            
            const users = JSON.parse(localStorage.getItem('users'));
            const me = users.find(u => u.username === current.username);
            if(me && me.schedule) {
                document.getElementById('user-schedule-text').innerText = me.schedule;
            }

            if(current.username === "Adrien") document.body.classList.add('is-owner');
        }
    }

    // --- ORDER LOGIC ---
    function updatePricing() {
        const val = document.getElementById('bin-slider').value;
        currentBins = val;
        currentPrice = "$" + (15 + (val - 1) * 10);
        document.getElementById('bin-display').innerText = val + (val > 1 ? " Bins" : " Bin");
        document.getElementById('single-price').innerText = currentPrice;
    }

    function initiateOrder(plan) {
        if(!current) return alert("Sign in first!");
        selectedPlan = plan;
        if(plan === "Monthly Subscription") { currentPrice = "$20"; currentBins = "Standard"; }
        // For simplicity, using prompt for address in this fix
        const addr = prompt("Please confirm your service address:");
        if(!addr) return;
        sendOrder(addr);
    }

    async function sendOrder(addr) {
        const params = {
            to_email: ADMIN, 
            user_name: current.username,
            legal_name: current.legalName || current.username,
            address: addr,
            plan: selectedPlan,
            bin_count: currentBins,
            price: currentPrice
        };

        try {
            await emailjs.send(E_SER, T_OWN, params);
            let users = JSON.parse(localStorage.getItem('users'));
            let idx = users.findIndex(u => u.username === current.username);
            users[idx].status = "Booked: " + selectedPlan;
            users[idx].address = addr;
            localStorage.setItem('users', JSON.stringify(users));
            alert("Thanks for booking! Our team will contact you soon to schedule the best time.");
            location.reload();
        } catch (e) { alert("Email error!"); }
    }

    // --- FOUNDER PANEL TABS ---
    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-' + id.split('-')[1]).classList.add('active');
        if(id === 'tab-users') loadUserTable();
        if(id === 'tab-sch') filterSchUsers();
    }

    // TAB 1: USERS
    function loadUserTable() {
        const users = JSON.parse(localStorage.getItem('users')).filter(u => u.username !== "Adrien");
        document.getElementById('user-list-body').innerHTML = users.map(u => `
            <tr class="border-b border-slate-800/50">
                <td class="py-4 font-bold text-white uppercase">${u.username}</td>
                <td class="py-4 text-emerald-500 font-bold">${u.status || 'Active'}</td>
                <td class="py-4 opacity-40">${u.phone || 'No Contact'}</td>
                <td class="py-4 text-right flex justify-end gap-2">
                    <button onclick="changeSub('${u.username}')" class="bg-slate-800 px-3 py-1 rounded text-[9px] uppercase">Plan</button>
                    <button onclick="deleteUser('${u.username}')" class="text-red-500 px-2 py-1"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    function changeSub(name) {
        const p = prompt("New status/plan for " + name + ":", "Monthly Member");
        if(!p) return;
        let users = JSON.parse(localStorage.getItem('users'));
        let idx = users.findIndex(u => u.username === name);
        users[idx].status = p;
        localStorage.setItem('users', JSON.stringify(users));
        loadUserTable();
    }

    function deleteUser(name) {
        if(!confirm("Kill account " + name + "?")) return;
        let users = JSON.parse(localStorage.getItem('users'));
        localStorage.setItem('users', JSON.stringify(users.filter(u => u.username !== name)));
        loadUserTable();
    }

    // TAB 2: ANNOUNCEMENTS
    function postAnnouncement() {
        const txt = document.getElementById('ann-input').value;
        if(!txt) return;
        localStorage.setItem('globalAnn', txt);
        location.reload();
    }
    function deleteAnnouncement() {
        localStorage.removeItem('globalAnn');
        location.reload();
    }
    function closeAnnouncement() {
        document.getElementById('global-announcement').classList.add('hidden');
    }

    // TAB 3: SCHEDULING
    function filterSchUsers() {
        const query = document.getElementById('sch-search').value.toLowerCase();
        const users = JSON.parse(localStorage.getItem('users')).filter(u => u.username !== "Adrien" && u.username.toLowerCase().includes(query));
        document.getElementById('sch-user-list').innerHTML = users.map(u => `
            <div class="glass-card p-4 rounded-2xl flex justify-between items-center">
                <div>
                    <p class="font-black uppercase text-white">${u.username}</p>
                    <p class="text-[9px] opacity-40">${u.address || 'No Address'}</p>
                </div>
                <button onclick="openSchEditor('${u.username}')" class="bg-emerald-500 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Edit Schedule</button>
            </div>
        `).join('');
    }

    function openSchEditor(name) {
        const date = prompt("Enter Cleaning Date & Time (e.g. Oct 12th @ 3PM):");
        if(date === null) return;
        let users = JSON.parse(localStorage.getItem('users'));
        let idx = users.findIndex(u => u.username === name);
        users[idx].schedule = date;
        localStorage.setItem('users', JSON.stringify(users));
        alert("Schedule updated for " + name);
    }

    // --- MODALS & AUTH (Standard) ---
    function openM(id) { document.getElementById(id).classList.remove('hidden'); if(id === 'owner-panel') switchTab('tab-users'); }
    function closeM(id) { document.getElementById(id).classList.add('hidden'); }
    function logout() { localStorage.removeItem('loggedUser'); location.reload(); }
    
    boot();
</script>
</body>
</html>
