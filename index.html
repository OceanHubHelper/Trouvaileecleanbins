<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Bins | Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid #1e293b; border-radius: 24px; }
        .btn { transition: 0.2s; cursor: pointer; user-select: none; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; text-transform: uppercase; }
        .btn:active { transform: scale(0.95); }
        .owner-view { display: none !important; }
        body.is-owner .owner-view { display: block !important; }
        input, textarea { background: #0f172a; border: 1px solid #334155; padding: 14px; border-radius: 12px; color: white; width: 100%; outline: none; }
        input:focus { border-color: #10b981; }
        input[type="datetime-local"] { color-scheme: dark; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <div id="top-banner" class="hidden bg-emerald-600 text-white py-3 text-center sticky top-0 z-[9999] font-bold text-[10px] uppercase tracking-widest shadow-xl">
        <div class="flex items-center justify-center gap-2">
            <i class="fa-solid fa-bullhorn animate-bounce"></i>
            <span id="banner-text">Notice</span>
        </div>
    </div>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <h1 class="text-2xl font-black italic uppercase">Clean <span class="text-emerald-500">Bins</span></h1>
        <div class="relative">
            <button onclick="toggleMenu()" class="btn glass px-5 py-2 flex items-center gap-3 border-slate-700">
                <p id="u-display" class="text-[10px]">Guest</p>
                <i class="fa-solid fa-user-circle text-emerald-500 text-xl"></i>
            </button>
            <div id="u-menu" class="hidden absolute right-0 mt-4 w-64 glass p-4 shadow-2xl z-[10000]">
                <div id="auth-on" class="hidden space-y-2">
                    <button onclick="openModal('founder-hub')" class="owner-view w-full p-4 bg-emerald-500/10 rounded-xl text-emerald-500 text-[10px]">Owner Hub</button>
                    <button onclick="openModal('my-time')" class="w-full p-4 hover:bg-slate-800 rounded-xl text-[10px]">My Schedule</button>
                    <button onclick="logout()" class="w-full p-4 text-red-500 text-[10px]">Sign Out</button>
                </div>
                <div id="auth-off">
                    <button onclick="openModal('auth-modal')" class="w-full bg-emerald-500 py-4 rounded-xl text-white text-[10px]">Sign In</button>
                </div>
            </div>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto px-6 py-20 text-center">
        <h2 class="text-7xl font-black uppercase italic mb-4 leading-none">Clean <span class="text-emerald-500">Bins</span></h2>
        <p class="text-slate-400 mb-10">Professional trash bin cleaning. Refresh your home today.</p>
        <div class="flex flex-col sm:flex-row justify-center gap-4">
            <a href="#plans" class="btn bg-emerald-500 text-white px-10 py-5 rounded-2xl text-[11px]">View Plans</a>
            <button id="hero-login" onclick="openModal('auth-modal')" class="btn glass text-white px-10 py-5 rounded-2xl text-[11px]">Client Login</button>
        </div>
    </header>

    <section id="plans" class="max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-8">
        <div class="glass p-10 border-slate-800">
            <h4 class="text-2xl font-black uppercase italic mb-6 text-emerald-500">One-Time</h4>
            <div class="flex justify-between items-end mb-8">
                <span id="bin-qty" class="text-4xl font-black">1 Bin</span>
                <span id="price-val" class="text-4xl font-black">$15</span>
            </div>
            <input type="range" id="bin-range" min="1" max="10" value="1" oninput="updatePricing()" class="mb-10 accent-emerald-500">
            <button onclick="book('One-Time')" class="btn w-full bg-white text-black py-6 rounded-2xl text-xs">Order Now</button>
        </div>

        <div class="glass p-10 border-emerald-500/20">
            <h4 class="text-2xl font-black uppercase italic mb-2 text-emerald-400">Monthly Plan</h4>
            <p class="text-[10px] text-slate-500 mb-6 font-bold uppercase">6 Bins Total • 3-Week Cycle</p>
            <div class="mb-10">
                <span class="text-7xl font-black">$45</span>
                <span class="text-slate-500 font-bold uppercase text-sm">/ Mo</span>
            </div>
            <button onclick="book('Monthly Plan')" class="btn w-full bg-emerald-500 text-white py-6 rounded-2xl text-xs">Get Subscription</button>
        </div>
    </section>

    <div id="founder-hub" class="hidden fixed inset-0 bg-slate-950/98 z-[11000] p-4 flex items-center justify-center">
        <div class="glass w-full max-w-6xl h-[90vh] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <div class="flex gap-6">
                    <button onclick="showTab('tab-registry')" class="text-xs font-black uppercase text-emerald-500">User List</button>
                    <button onclick="showTab('tab-announcement')" class="text-xs font-black uppercase text-slate-500">Banner Control</button>
                </div>
                <button onclick="closeModal('founder-hub')"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-8">
                <div id="tab-registry" class="tab-content active space-y-4">
                    <div id="registry-render" class="grid gap-4"></div>
                </div>
                <div id="tab-announcement" class="tab-content">
                    <div class="max-w-md mx-auto glass p-8">
                        <h3 class="text-center font-black uppercase mb-4">Set Global Banner</h3>
                        <textarea id="banner-input" placeholder="Type message..."></textarea>
                        <div class="flex gap-2 mt-4">
                            <button onclick="saveBanner()" class="btn flex-1 bg-emerald-500 py-4 rounded-xl text-[10px]">Post</button>
                            <button onclick="killBanner()" class="btn flex-1 bg-red-600/20 text-red-500 py-4 rounded-xl text-[10px]">Clear</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 bg-slate-950/98 z-[12000] flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-10 text-center">
            <h3 id="auth-title" class="text-3xl font-black uppercase italic mb-8">Sign In</h3>
            <div id="reg-inputs" class="hidden space-y-3 mb-3">
                <input id="reg-name" type="text" placeholder="Full Name">
                <input id="reg-num" type="tel" placeholder="Number">
            </div>
            <input id="auth-u" type="text" placeholder="Username" class="mb-3">
            <input id="auth-p" type="password" placeholder="Passcode" class="mb-6">
            <button onclick="doAuth()" class="btn w-full bg-emerald-500 py-5 rounded-2xl text-xs">Continue</button>
            <p onclick="toggleAuth()" id="auth-toggle" class="mt-6 text-[10px] text-slate-500 uppercase cursor-pointer font-bold">New Account? Sign Up</p>
        </div>
    </div>

    <div id="my-time" class="hidden fixed inset-0 bg-slate-950/98 z-[12000] flex items-center justify-center p-6">
        <div class="glass p-10 text-center w-full max-w-xs border-emerald-500/20">
            <h3 class="text-[10px] font-black uppercase text-slate-500 mb-6">Cleaning Schedule</h3>
            <div id="client-schedule-list" class="space-y-2 mb-8 text-sm font-bold">
                </div>
            <div class="p-4 bg-slate-900 rounded-2xl border border-slate-800">
                <p id="timer-txt" class="text-[10px] text-emerald-500 uppercase font-black">Plan: Standard</p>
            </div>
            <button onclick="closeModal('my-time')" class="mt-8 text-xs font-black text-slate-500 uppercase">Close</button>
        </div>
    </div>

    <script>
        const CFG = { s: "service_6ymb279", t: "template_pruo22c", k: "Or10zkajJK3CNcnic", a: "favela23@gmail.com" };
        emailjs.init(CFG.k);

        let users = JSON.parse(localStorage.getItem('users')) || [];
        let session = JSON.parse(localStorage.getItem('session')) || null;
        let isSigningUp = false;

        function start() {
            if (session) {
                document.getElementById('u-display').innerText = session.username;
                document.getElementById('auth-off').classList.add('hidden');
                document.getElementById('auth-on').classList.remove('hidden');
                document.getElementById('hero-login').classList.add('hidden');
                if (session.username === "Adrien") document.body.classList.add('is-owner');
                updateClientView();
            }
            const banner = localStorage.getItem('global_banner');
            if (banner) {
                document.getElementById('top-banner').classList.remove('hidden');
                document.getElementById('banner-text').innerText = banner;
            }
            updatePricing();
            renderUsers();
            checkSchedules();
        }

        function updatePricing() {
            const v = document.getElementById('bin-range').value;
            document.getElementById('bin-qty').innerText = v + (v > 1 ? " Bins" : " Bin");
            document.getElementById('price-val').innerText = "$" + (15 + (v - 1) * 10);
        }

        function toggleAuth() {
            isSigningUp = !isSigningUp;
            document.getElementById('auth-title').innerText = isSigningUp ? "Sign Up" : "Sign In";
            document.getElementById('reg-inputs').classList.toggle('hidden', !isSigningUp);
            document.getElementById('auth-toggle').innerText = isSigningUp ? "Already have an account? Sign In" : "New Account? Sign Up";
        }

        function doAuth() {
            const u = document.getElementById('auth-u').value.trim();
            const p = document.getElementById('auth-p').value.trim();
            if (!isSigningUp) {
                if (u === "Adrien" && p === "favela23") return login({username:"Adrien", name:"Owner"});
                const user = users.find(x => x.username === u && x.password === p);
                if (user) login(user); else alert("Login Failed.");
            } else {
                const n = document.getElementById('reg-name').value.trim();
                const num = document.getElementById('reg-num').value.trim();
                if (!u || !p || !n) return alert("Fill everything!");
                const newUser = { username: u, password: p, name: n, number: num, plan: "One-Time", schedule: [], expiry: "" };
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                login(newUser);
            }
        }

        async function book(tier) {
            if (!session) return openModal('auth-modal');
            const addr = prompt("Enter Service Address:");
            if (!addr) return;
            const profile = users.find(u => u.username === session.username) || session;
            const price = tier === "Monthly Plan" ? "$45" : document.getElementById('price-val').innerText;

            try {
                await emailjs.send(CFG.s, CFG.t, {
                    to_email: CFG.a,
                    legal_name: profile.name,
                    number: profile.number,
                    user_name: session.username,
                    address: addr,
                    plan: tier,
                    price: price,
                    bin_amount: tier === "Monthly Plan" ? "6 (Subscription)" : document.getElementById('bin-range').value
                });
                alert("Order sent to Adrien!");
            } catch (e) { alert("Error!"); }
        }

        // --- OWNER COMMANDS ---
        function renderUsers() {
            const list = document.getElementById('registry-render');
            if (!list) return;
            list.innerHTML = users.map(u => `
                <div class="glass p-6 flex flex-wrap justify-between items-center gap-4">
                    <div>
                        <p class="font-black text-sm uppercase">${u.username} <span class="text-[9px] text-emerald-500">(${u.plan})</span></p>
                        <p class="text-[10px] font-bold text-slate-500">${u.name} • ${u.number}</p>
                        ${u.expiry ? `<p class="text-[8px] text-red-400 uppercase mt-1">Expires: ${u.expiry}</p>` : ''}
                    </div>
                    <div class="flex gap-2 items-center">
                        <button onclick="setMonthly('${u.username}')" class="bg-blue-600/20 text-blue-400 p-2 rounded-lg text-[9px] font-bold uppercase">Upgrade</button>
                        <input type="datetime-local" id="date-${u.username}" class="w-32 py-1 px-2 text-[10px]">
                        <button onclick="addSchedule('${u.username}')" class="bg-emerald-500 p-2 rounded-lg"><i class="fa-solid fa-plus"></i></button>
                        <button onclick="trash('${u.username}')" class="text-red-500 ml-2"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function setMonthly(un) {
            const i = users.findIndex(u => u.username === un);
            users[i].plan = "Monthly Plan";
            // Set expiry for 1 month from now
            let d = new Date();
            d.setMonth(d.getMonth() + 1);
            users[i].expiry = d.toLocaleDateString();
            localStorage.setItem('users', JSON.stringify(users));
            renderUsers();
            alert(`${un} is now Monthly. Ends on ${users[i].expiry}`);
        }

        async function addSchedule(un) {
            const val = document.getElementById(`date-${un}`).value;
            if (!val) return;
            const i = users.findIndex(u => u.username === un);
            users[i].schedule.push(val);
            localStorage.setItem('users', JSON.stringify(users));
            renderUsers();
            alert("Schedule Added!");
            
            // Email Adrien about the new scheduled task
            await emailjs.send(CFG.s, CFG.t, {
                to_email: CFG.a,
                legal_name: "SYSTEM ALERT",
                address: "New Schedule Created for " + un,
                plan: "Task Scheduled",
                price: "N/A",
                bin_amount: "N/A",
                eta_request: val
            });
        }

        function checkSchedules() {
            const today = new Date().toISOString().split('T')[0];
            users.forEach(u => {
                // Check for cleaning day
                u.schedule.forEach(s => {
                    if (s.startsWith(today)) {
                        console.log("Job Today: " + u.username);
                        // You could trigger an email here too
                    }
                });
                // Check for plan expiry
                if (u.expiry && new Date(u.expiry) < new Date()) {
                    u.plan = "One-Time";
                    u.expiry = "";
                    localStorage.setItem('users', JSON.stringify(users));
                }
            });
        }

        function updateClientView() {
            const profile = users.find(u => u.username === session.username);
            if (!profile) return;
            const list = document.getElementById('client-schedule-list');
            list.innerHTML = profile.schedule.length > 0 
                ? profile.schedule.map(s => `<div><i class="fa-solid fa-calendar-day text-emerald-500 mr-2"></i> ${new Date(s).toLocaleString()}</div>`).join('')
                : "No cleans scheduled.";
            document.getElementById('timer-txt').innerText = `Plan: ${profile.plan} ${profile.expiry ? '(Ends: ' + profile.expiry + ')' : ''}`;
        }

        function saveBanner() { localStorage.setItem('global_banner', document.getElementById('banner-input').value); location.reload(); }
        function killBanner() { localStorage.removeItem('global_banner'); location.reload(); }
        function login(o) { localStorage.setItem('session', JSON.stringify(o)); location.reload(); }
        function logout() { localStorage.removeItem('session'); location.reload(); }
        function toggleMenu() { document.getElementById('u-menu').classList.toggle('hidden'); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function trash(un) { if(confirm("Delete?")) { users = users.filter(u => u.username !== un); localStorage.setItem('users', JSON.stringify(users)); renderUsers(); } }

        start();
    </script>
</body>
</html>
