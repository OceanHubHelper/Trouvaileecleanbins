<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
const user = JSON.parse(localStorage.getItem("user"));
if (!user) location.href = "login.html";

window.onload = () => {
  document.getElementById("name").innerText = user.name;
};

window.book = async function () {
  alert("Booking sent (Supabase ready upgrade available)");
};
</script>

</head>

<body class="bg-slate-950 text-white p-10">

<h1 class="text-3xl font-bold">Welcome <span id="name"></span></h1>

<div class="mt-10 bg-slate-900 p-6 rounded-xl">
  <input class="w-full p-3 mb-3 bg-slate-800 rounded" placeholder="Address">
  <input class="w-full p-3 mb-3 bg-slate-800 rounded" placeholder="Bins">

  <button onclick="book()" class="bg-emerald-500 px-6 py-3 rounded font-bold">
    Book Service
  </button>
</div>

</body>
</html>
