<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard | Trouvaille Bins</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-white min-h-screen">

<nav class="glass border-b border-white/10">
<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
<h1 class="text-2xl font-black italic">
Trouvaille <span class="text-emerald-400">Bins</span>
</h1>

<div class="flex gap-3 items-center">
<span id="welcomeUser" class="text-slate-300 font-bold"></span>
<button onclick="logout()" class="btn bg-red-500">Logout</button>
</div>
</div>
</nav>

<section class="max-w-6xl mx-auto px-6 py-12 grid md:grid-cols-2 gap-8">

<!-- ACCOUNT -->
<div class="glass p-8 rounded-3xl">
<h2 class="text-2xl font-black mb-6">My Account</h2>

<div class="space-y-4 text-slate-300">
<p><span class="text-white font-bold">Name:</span> <span id="accName"></span></p>
<p><span class="text-white font-bold">Username:</span> <span id="accUser"></span></p>
<p><span class="text-white font-bold">Phone:</span> <span id="accPhone"></span></p>
<p><span class="text-white font-bold">Plan:</span> <span id="accPlan"></span></p>
</div>
</div>

<!-- BOOK -->
<div class="glass p-8 rounded-3xl">
<h2 class="text-2xl font-black mb-6">Book Service</h2>

<input id="address" class="input mb-4" placeholder="Street Address">

<select id="planSelect" class="input mb-4">
<option value="One-Time">One-Time Clean</option>
<option value="Monthly">Monthly Plan</option>
</select>

<input id="bins" type="number" min="1" value="1" class="input mb-4" placeholder="Bins">

<button onclick="bookService()" class="btn bg-emerald-500 w-full">
Submit Booking
</button>
</div>

<!-- SCHEDULE -->
<div class="glass p-8 rounded-3xl md:col-span-2">
<h2 class="text-2xl font-black mb-6">My Schedule</h2>

<div id="scheduleList" class="space-y-3 text-slate-300">
Loading...
</div>
</div>

</section>

<script src="supabase.js"></script>
<script src="app.js"></script>

<script>
loadDashboard();
</script>

</body>
</html>
